<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrorecords+</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Custom config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'agro-purple': '#9333ea', 
                        'agro-purple-dark': '#7e22ce',
                        'agro-accent': '#c084fc',
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'float': 'float 3s ease-in-out infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-5px)' },
                        }
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.1)',
                        'glow': '0 0 15px rgba(147, 51, 234, 0.3)',
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }

        /* Glassmorphism Utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .action-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .action-card:active {
            transform: scale(0.95);
        }

        /* Barcode Pattern */
        .modern-barcode {
            background-image: repeating-linear-gradient(90deg, 
                currentColor 0, 
                currentColor 2px, 
                transparent 2px, 
                transparent 4px);
            opacity: 0.7;
        }
    </style>
</head>
<body class="font-body text-slate-800 pb-10 overflow-x-hidden relative">

    <!-- Ambient Background Blobs -->
    <div class="fixed inset-0 pointer-events-none -z-10 overflow-hidden">
        <div class="absolute top-0 left-1/4 w-72 h-72 bg-purple-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
        <div class="absolute top-0 right-1/4 w-72 h-72 bg-fuchsia-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
    </div>

    <!-- MODERN HEADER -->
    <header class="bg-gradient-to-br from-purple-700 via-purple-600 to-fuchsia-600 pt-10 pb-24 px-6 rounded-b-[3rem] shadow-2xl relative z-20">
        <div class="flex items-center justify-between">
            <button onclick="history.back()" class="bg-white/20 backdrop-blur-md p-2 rounded-xl text-white hover:bg-white/30 transition active:scale-95">
            <a href="home page.html">     <i class="fas fa-arrow-left text-lg"></i> </a>
            </button>
            
            <div class="text-center">
                <h1 class="text-white text-2xl font-bold tracking-wide">Agrorecords<span class="font-light opacity-80">+</span></h1>
                <p class="text-purple-100 text-[10px] font-medium tracking-wider uppercase mt-1">Digital Farm Registry</p>
            </div>

            <a href="profile.html" class="bg-white/20 backdrop-blur-md p-2 rounded-xl text-white hover:bg-white/30 transition active:scale-95">
                <i class="fas fa-user text-lg"></i>
            </a>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="px-6 -mt-16 relative z-30 max-w-lg mx-auto">

        <!-- FLOATING ACTION GRID -->
        <div class="grid grid-cols-3 gap-4 mb-8">
            <!-- Generate -->
            <div class="action-card glass-panel rounded-2xl p-4 flex flex-col items-center gap-3 shadow-lg shadow-purple-500/10 cursor-pointer group hover:bg-white">
                <div class="w-12 h-12 rounded-xl bg-purple-50 text-purple-600 flex items-center justify-center text-xl shadow-inner group-hover:bg-purple-600 group-hover:text-white transition-colors duration-300">
                <a href="scanbr2.html" onclick="handleOperaRedirect(event)"> <i class="fas fa-file-invoice"></i>
                </div>
                <span class="text-[10px] font-bold text-slate-600 uppercase tracking-wide text-center">Generate</span></a> 
            </div>

            <!-- Scan -->
            <div class="action-card glass-panel rounded-2xl p-4 flex flex-col items-center gap-3 shadow-lg shadow-purple-500/10 cursor-pointer group hover:bg-white">
                <div class="w-12 h-12 rounded-xl bg-purple-50 text-purple-600 flex items-center justify-center text-xl shadow-inner group-hover:bg-purple-600 group-hover:text-white transition-colors duration-300">
                 <a href="scanbr.html" onclick="handleOperaRedirect(event)"><i class="fas fa-qrcode"></i>
                </div>
                <span class="text-[10px] font-bold text-slate-600 uppercase tracking-wide text-center">Scan BR</span></a>
            </div>

            <!-- Add -->
            <div class="action-card glass-panel rounded-2xl p-4 flex flex-col items-center gap-3 shadow-lg shadow-purple-500/10 cursor-pointer group hover:bg-white">
                <div class="w-12 h-12 rounded-xl bg-purple-50 text-purple-600 flex items-center justify-center text-xl shadow-inner group-hover:bg-purple-600 group-hover:text-white transition-colors duration-300">
                  <a href="camera.html" onclick="handleOperaRedirect(event)">   <i class="fas fa-plus"></i>
                </div>
                <span class="text-[10px] font-bold text-slate-600 uppercase tracking-wide text-center">Add Data</span></a> 
            </div>
        </div>

        <!-- MODERN INSTRUCTION FLOW -->
        <div class="bg-white rounded-3xl p-6 shadow-xl border border-slate-100 relative overflow-hidden">
            <!-- Header -->
            <div class="flex items-center gap-2 mb-6">
                <div class="w-1 h-6 bg-purple-500 rounded-full"></div>
                <h2 class="text-lg font-bold text-slate-800">Quick Guide</h2>
            </div>

            <!-- Timeline Steps -->
            <div class="relative space-y-8 pl-4">
                <!-- Connecting Line -->
                <div class="absolute left-[27px] top-4 bottom-4 w-0.5 bg-gradient-to-b from-purple-200 to-transparent"></div>

                <!-- Step 1 -->
                <div class="relative flex items-center gap-4 animate-float" style="animation-delay: 0s;">
                    <div class="w-10 h-10 rounded-full bg-white border-4 border-purple-100 flex items-center justify-center z-10 shadow-sm">
                        <i class="fas fa-mobile-alt text-purple-500 text-sm"></i>
                    </div>
                    <div class="flex-1 bg-slate-50 p-3 rounded-xl border border-slate-100 flex items-center justify-between">
                        <div>
                            <h3 class="text-xs font-bold text-slate-700">Scan Barcode</h3>
                            <p class="text-[10px] text-slate-400">Point camera at code</p>
                        </div>
                        <div class="w-8 h-8 relative overflow-hidden rounded opacity-50">
                            <div class="absolute inset-0 bg-red-500/20 animate-pulse"></div>
                            <div class="absolute top-1/2 left-0 w-full h-0.5 bg-red-500"></div>
                        </div>
                    </div>
                </div>

                <!-- Step 2 -->
                <div class="relative flex items-center gap-4 animate-float" style="animation-delay: 1s;">
                    <div class="w-10 h-10 rounded-full bg-white border-4 border-purple-100 flex items-center justify-center z-10 shadow-sm">
                        <i class="fas fa-barcode text-purple-500 text-sm"></i>
                    </div>
                    <div class="flex-1 bg-slate-50 p-3 rounded-xl border border-slate-100 flex items-center justify-between">
                        <div>
                            <h3 class="text-xs font-bold text-slate-700">Read Data</h3>
                            <p class="text-[10px] text-slate-400">Auto-fetch details</p>
                        </div>
                        <div class="w-12 h-6 text-slate-800 modern-barcode"></div>
                    </div>
                </div>

                <!-- Step 3 -->
                <div class="relative flex items-center gap-4 animate-float" style="animation-delay: 2s;">
                    <div class="w-10 h-10 rounded-full bg-white border-4 border-green-100 flex items-center justify-center z-10 shadow-sm">
                        <i class="fas fa-check text-green-500 text-sm"></i>
                    </div>
                    <div class="flex-1 bg-green-50 p-3 rounded-xl border border-green-100 flex items-center justify-between">
                        <div>
                            <h3 class="text-xs font-bold text-green-800">Auto Save</h3>
                            <p class="text-[10px] text-green-600">Securely stored</p>
                        </div>
                        <i class="fas fa-cloud-upload-alt text-green-500 text-lg"></i>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Opera Redirect Script -->
    <script>
        function handleOperaRedirect(event) {
            // Check for Opera user agent
            if (navigator.userAgent.includes("Opera") || navigator.userAgent.includes("OPR")) {
                event.preventDefault(); // Stop default link behavior
                window.location.href = "scanbr.html"; // Redirect to scanbr.html
            }
        }
    </script>

</body>
</html>
