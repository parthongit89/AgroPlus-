<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agromart+ Monthly</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        agro: {
                            50: '#e8f5e9',
                            100: '#c8e6c9',
                            500: '#00C853', // Brand Color
                            600: '#43A047',
                            900: '#1B5E20',
                        }
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.08)',
                        'glow': '0 0 20px rgba(0, 200, 83, 0.3)'
                    },
                    spacing: {
                        'safe-top': 'env(safe-area-inset-top)',
                        'safe-bottom': 'env(safe-area-inset-bottom)'
                    }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #f8fafc; }
        
        /* Smooth Fade In */
        .fade-in { animation: fadeIn 0.6s ease-out forwards; opacity: 0; transform: translateY(10px); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        /* Custom Scrollbar */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        /* Glassmorphism for the pill */
        .glass-pill {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="text-slate-800 flex flex-col h-screen overflow-hidden">

    <!-- HEADER (UPDATED STYLE) -->
    <!-- Changed: rounded-b-[2rem] -> rounded-br-[5rem] to match image. Removed heavy button backgrounds. -->
    <header class="bg-agro-500 pt-8 px-6 pb-12 flex justify-between items-center shadow-lg relative z-10 rounded-br-[5rem]">
        <!-- Left Icon -->
        <a href="home page.html" class="text-white hover:text-green-100 transition transform hover:-translate-x-1">
             <i class="fas fa-arrow-left text-xl"></i>
        </a>
        
        <!-- Center Title -->
        <div class="text-center">
            <h1 class="text-white text-3xl font-sans font-normal tracking-wide">Agromart+</h1>
        </div>

        <!-- Right Icon -->
        <a href="profile.html" class="text-white hover:text-green-100 transition transform hover:scale-110" aria-label="User Profile">
            <i class="fas fa-user-circle text-3xl"></i>
        </a>
    </header>

    <!-- MAIN CONTENT (Overlapping Header) -->
    <main class="flex-1 overflow-y-auto -mt-8 px-4 pb-24 relative z-20 space-y-5 hide-scroll">

        <!-- 1. TIME PILL (Floating) -->
        <div class="flex justify-center fade-in" style="animation-delay: 0.1s;">
            <div class="bg-slate-900/90 text-white rounded-full px-5 py-2 flex items-center gap-4 shadow-xl border border-slate-700/50 backdrop-blur-md">
                <i class="fas fa-eye text-agro-500 text-xs"></i>
                <div class="h-4 w-px bg-white/20"></div>
                <div class="flex items-center gap-2 font-mono text-xs">
                    <span id="live-date" class="opacity-80">--</span>
                    <span class="text-agro-500 font-bold">•</span>
                    <span id="live-time" class="font-bold">--:--</span>
                </div>
                <div class="h-4 w-px bg-white/20"></div>
                <i class="fas fa-chart-pie text-orange-400 text-xs"></i>
            </div>
        </div>

        <!-- 2. MONTHLY GRAPH CARD -->
        <div class="bg-white rounded-3xl p-5 shadow-soft fade-in relative overflow-hidden" style="animation-delay: 0.2s;">
            <!-- Month Controls -->
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h2 class="text-lg font-bold text-slate-800">Price Trends</h2>
                    <p class="text-xs text-slate-500">Monthly Fluctuation</p>
                </div>
                <div class="flex bg-slate-100 rounded-lg p-1">
                    <button onclick="setPeriod('W')" class="px-3 py-1 text-xs font-medium text-slate-500 rounded-md hover:bg-white hover:shadow-sm transition">W</button>
                    <button onclick="setPeriod('M')" class="px-3 py-1 text-xs font-bold text-white bg-agro-500 rounded-md shadow-sm transition">M</button>
                    <button onclick="setPeriod('Y')" class="px-3 py-1 text-xs font-medium text-slate-500 rounded-md hover:bg-white hover:shadow-sm transition">Y</button>
                </div>
            </div>

            <!-- Canvas -->
            <div class="h-48 w-full relative">
                <canvas id="monthlyChart"></canvas>
            </div>
        </div>

        <!-- 3. HIGHLIGHTS (Horizontal Scroll) -->
        <div class="fade-in" style="animation-delay: 0.3s;">
            <div class="flex gap-3 overflow-x-auto hide-scroll pb-2">
                <!-- Card 1 -->
                <div class="min-w-[140px] bg-green-50 rounded-2xl p-4 border border-green-100">
                    <div class="text-green-600 mb-1"><i class="fas fa-arrow-down"></i> Lowest</div>
                    <div class="text-xl font-bold text-slate-800">₹12.50</div>
                    <div class="text-[10px] text-slate-500">Potato (Local)</div>
                </div>
                <!-- Card 2 -->
                <div class="min-w-[140px] bg-red-50 rounded-2xl p-4 border border-red-100">
                    <div class="text-red-600 mb-1"><i class="fas fa-arrow-up"></i> Highest</div>
                    <div class="text-xl font-bold text-slate-800">₹85.00</div>
                    <div class="text-[10px] text-slate-500">Garlic (Import)</div>
                </div>
                <!-- Card 3 -->
                <div class="min-w-[140px] bg-blue-50 rounded-2xl p-4 border border-blue-100">
                    <div class="text-blue-600 mb-1"><i class="fas fa-chart-line"></i> Avg Vol</div>
                    <div class="text-xl font-bold text-slate-800">2.4k</div>
                    <div class="text-[10px] text-slate-500">Daily Transactions</div>
                </div>
            </div>
        </div>

        <!-- 4. MODERN LIST (Vegetables) -->
        <div class="fade-in pb-10" style="animation-delay: 0.4s;">
            <div class="flex justify-between items-end mb-3 px-1">
                <h3 class="font-bold text-slate-800 text-lg">Market Rates</h3>
                <span class="text-xs text-agro-600 font-medium">Updated 5m ago</span>
            </div>
            
            <div class="bg-white rounded-3xl shadow-soft divide-y divide-slate-100" id="veggie-list">
                <!-- Items injected by JS -->
            </div>
        </div>

    </main>

    <!-- FLOATING ACTION BUTTON -->
    <button class="fixed bottom-24 right-5 w-14 h-14 bg-agro-500 text-white rounded-full shadow-glow flex items-center justify-center text-2xl hover:scale-105 transition active:scale-95 z-40">
        <i class="fas fa-plus"></i>
    </button>

    <!-- BOTTOM NAVIGATION -->
    <nav class="bg-white border-t border-slate-100 fixed bottom-0 w-full pb-safe-bottom pt-2 px-6 flex justify-between items-center z-50 text-slate-400 text-[10px] font-medium">
        <button class="flex flex-col items-center gap-1 text-agro-600">
            <i class="fas fa-home text-xl"></i>
            <span>Home</span>
        </button>
        <button class="flex flex-col items-center gap-1 hover:text-agro-600 transition">
            <i class="fas fa-chart-bar text-xl"></i>
            <span>Trends</span>
        </button>
        <div class="w-8"></div> <!-- Spacer for FAB -->
        <button class="flex flex-col items-center gap-1 hover:text-agro-600 transition">
            <i class="fas fa-shopping-basket text-xl"></i>
            <span>Orders</span>
        </button>
        <button class="flex flex-col items-center gap-1 hover:text-agro-600 transition">
            <i class="fas fa-user text-xl"></i>
            <span>Profile</span>
        </button>
    </nav>

    <script>
        // --- 1. CONFIGURATION ---
        // Using images from previous turns for visual fidelity
        const vegIcons = {
            'Onion': 'https://img.icons8.com/color/48/onion.png',
            'Tomato': 'https://img.icons8.com/color/48/tomato.png',
            'Potato': 'https://img.icons8.com/color/48/potato.png',
            'Carrot': 'https://img.icons8.com/color/48/carrot.png',
            'Capsicum': 'https://img.icons8.com/color/48/paprika.png',
            'Spinach': 'https://img.icons8.com/color/48/spinach.png',
            'Broccoli': 'https://img.icons8.com/color/48/cauliflower.png'
        };

        const vegetables = [
            { name: "Onion", online: 35, local: 25, trend: 1 },
            { name: "Potato", online: 22, local: 18, trend: -1 },
            { name: "Tomato", online: 45, local: 40, trend: 1 },
            { name: "Carrot", online: 30, local: 28, trend: 0 },
            { name: "Capsicum", online: 60, local: 55, trend: 1 },
            { name: "Spinach", online: 15, local: 12, trend: -1 },
            { name: "Broccoli", online: 80, local: 70, trend: 0 }
        ];

        // --- 2. TIME LOGIC ---
        function updateTime() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-US', { day: 'numeric', month: 'short' });
            const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('live-date').innerText = dateStr;
            document.getElementById('live-time').innerText = timeStr;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // --- 3. CHART.JS CONFIG ---
        const ctx = document.getElementById('monthlyChart').getContext('2d');
        
        // Gradient
        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(0, 200, 83, 0.4)'); // Brand Green
        gradient.addColorStop(1, 'rgba(0, 200, 83, 0.0)');

        // Fake Data Generator (30 Days)
        const days = Array.from({length: 30}, (_, i) => i + 1);
        const randomData = () => Array.from({length: 30}, () => Math.floor(Math.random() * 30) + 20);

        let myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: days,
                datasets: [{
                    label: 'Price Trend',
                    data: randomData(),
                    borderColor: '#00C853',
                    backgroundColor: gradient,
                    borderWidth: 2,
                    pointRadius: 0, // Clean look
                    pointHoverRadius: 6,
                    fill: true,
                    tension: 0.4 // Smooth curves
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#1B5E20',
                        titleFont: { family: 'Plus Jakarta Sans' },
                        bodyFont: { family: 'Plus Jakarta Sans' },
                        displayColors: false,
                        callbacks: {
                            title: (ctx) => `Day ${ctx[0].label}`,
                            label: (ctx) => `₹${ctx.raw}`
                        }
                    }
                },
                scales: {
                    x: { 
                        grid: { display: false }, 
                        ticks: { font: { size: 10 }, maxTicksLimit: 6 } 
                    },
                    y: { 
                        display: false, // Hide Y axis for cleaner look
                        min: 0
                    }
                },
                interaction: {
                    mode: 'nearest',
                    axis: 'x',
                    intersect: false
                }
            }
        });

        // --- 4. LIST RENDERER ---
        function renderList() {
            const container = document.getElementById('veggie-list');
            
            vegetables.forEach((veg, index) => {
                const icon = vegIcons[veg.name] || 'https://img.icons8.com/color/48/vegetarian-food.png';
                
                // Trend Icon Logic
                let trendHtml = '';
                if (veg.trend > 0) trendHtml = '<span class="text-red-500 text-xs bg-red-50 px-1.5 py-0.5 rounded ml-2">▲</span>';
                else if (veg.trend < 0) trendHtml = '<span class="text-green-500 text-xs bg-green-50 px-1.5 py-0.5 rounded ml-2">▼</span>';
                else trendHtml = '<span class="text-slate-400 text-xs bg-slate-100 px-1.5 py-0.5 rounded ml-2">-</span>';

                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-4 cursor-pointer hover:bg-slate-50 transition active:bg-slate-100";
                div.onclick = () => updateGraphForVeg(veg.name);

                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-slate-100 p-2 flex-shrink-0">
                            <img src="${icon}" class="w-full h-full object-contain">
                        </div>
                        <div>
                            <div class="flex items-center">
                                <h4 class="font-bold text-slate-800">${veg.name}</h4>
                                ${trendHtml}
                            </div>
                            <p class="text-[10px] text-slate-500 mt-0.5">Mandi: ₹${veg.local}/kg</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="font-bold text-agro-600 text-lg">₹${veg.online}</div>
                        <div class="text-[10px] text-slate-400">Online Rate</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function updateGraphForVeg(name) {
            // Simulate data fetch
            const newData = randomData().map(v => v + Math.random() * 10);
            myChart.data.datasets[0].data = newData;
            myChart.update();
            // Provide feedback if needed (optional)
        }
        
        function setPeriod(p) {
            // Visual feedback only for demo
            alert(`Switched to ${p === 'W' ? 'Weekly' : p === 'M' ? 'Monthly' : 'Yearly'} View`);
        }

        renderList();

    </script>
</body>
</html>
