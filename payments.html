<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Farmpay+ Scan & Pay</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'fp-dark': '#0f172a',      /* Slate-950 */
                        'fp-surface': '#1e293b',   /* Slate-800 */
                        'fp-gold': '#fbbf24',      /* Amber-400 */
                        'fp-gold-dark': '#d97706', /* Amber-600 */
                        'fp-green': '#10b981',     /* Emerald-500 */
                        'fp-red': '#ef4444',       /* Red-500 */
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        mono: ['Space Grotesk', 'monospace'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 3s ease-in-out infinite',
                        'shake': 'shake 0.4s cubic-bezier(.36,.07,.19,.97) both',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-5px)' },
                        },
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Base Styles */
        body {
            transition: background-color 0.3s ease, color 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        /* Hide Scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Ambient Background Orbs */
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        .orb-1 { top: -10%; left: -10%; width: 300px; height: 300px; background: #fbbf24; }
        .orb-2 { bottom: 10%; right: -10%; width: 250px; height: 250px; background: #10b981; }
        
        html.light .bg-orb { opacity: 0.3; }
        html.dark .bg-orb { opacity: 0.15; }

        /* Glassmorphism */
        .glass-panel {
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(30, 41, 59, 0.6);
        }

        /* Nav Bar */
        .bottom-nav {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            background: rgba(15, 23, 42, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Scan FAB */
        .scan-fab {
            width: 64px; height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 20px rgba(251, 191, 36, 0.4);
            transform: translateY(-24px);
            transition: all 0.3s ease;
            position: relative;
            z-index: 51;
            border: 6px solid #0f172a;
        }
        .scan-fab:active { transform: translateY(-24px) scale(0.9); }

        /* PIN Dot Animation */
        .pin-dot {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: transparent;
            border-color: rgba(255,255,255,0.3);
        }
        .pin-dot.filled {
            background-color: #fbbf24; /* fp-gold */
            border-color: #fbbf24;
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        }
        .pin-dot.error {
            background-color: #ef4444;
            border-color: #ef4444;
            animation: shake 0.4s ease-in-out;
        }

        /* Keypad Button */
        .keypad-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            transition: all 0.1s ease;
            color: white;
            border-radius: 16px;
        }
        .keypad-btn:active {
            background: rgba(251, 191, 36, 0.2); /* Gold tint on press */
            border-color: rgba(251, 191, 36, 0.4);
            transform: scale(0.95);
        }

        /* Success Checkmark */
        .checkmark__circle { stroke-dasharray: 166; stroke-dashoffset: 166; stroke-width: 2; stroke-miterlimit: 10; stroke: #10b981; fill: none; animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards; }
        .checkmark { width: 80px; height: 80px; border-radius: 50%; display: block; stroke-width: 2; stroke: #fff; stroke-miterlimit: 10; box-shadow: inset 0px 0px 0px #10b981; animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s both; }
        .checkmark__check { transform-origin: 50% 50%; stroke-dasharray: 48; stroke-dashoffset: 48; animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards; }
        @keyframes stroke { 100% { stroke-dashoffset: 0; } }
        @keyframes scale { 0%, 100% { transform: none; } 50% { transform: scale3d(1.1, 1.1, 1); } }
        @keyframes fill { 100% { box-shadow: inset 0px 0px 0px 30px #10b981; } }
    </style>
</head>
<body class="h-screen w-full flex flex-col relative bg-fp-dark text-slate-200 overflow-hidden font-sans">

    <!-- Ambient Background -->
    <div class="bg-orb orb-1 animate-pulse-slow"></div>
    <div class="bg-orb orb-2"></div>

    <!-- Header -->
    <header class="px-6 pt-12 pb-4 flex items-center justify-between z-30 relative">
        <button onclick="window.history.back()" class="w-10 h-10 rounded-full bg-fp-surface/50 border border-white/5 flex items-center justify-center text-white hover:bg-white/10 transition backdrop-blur-sm">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h1 class="text-xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-fp-gold to-orange-500">
            Pay Securely
        </h1>
        <div class="w-10 h-10"></div> <!-- Spacer -->
    </header>

    <!-- Main Content -->
    <main class="flex-grow relative w-full h-full px-6 z-20 overflow-y-auto no-scrollbar pb-32 flex flex-col">
        
        <!-- Recipient Card -->
        <div class="glass-panel p-4 rounded-3xl mb-6 flex items-center gap-4 border-b border-white/10">
            <div class="w-12 h-12 rounded-2xl bg-fp-gold/20 flex items-center justify-center text-fp-gold text-xl border border-fp-gold/20">
                <i class="fas fa-store"></i>
            </div>
            <div>
                <p class="text-xs text-slate-400 font-mono tracking-widest uppercase">Paying to</p>
                <h2 class="text-lg font-bold text-white leading-tight">Agro Supplies Store</h2>
                <div class="flex items-center gap-1 text-[10px] text-fp-green font-mono mt-1">
                    <i class="fas fa-shield-alt"></i> Verified Merchant
                </div>
            </div>
        </div>

        <!-- Amount Input Section -->
        <div class="flex-grow flex flex-col justify-center items-center relative">
            <label class="text-xs text-fp-gold font-bold mb-4 tracking-[0.2em] uppercase">Enter Amount</label>
            
            <div class="relative w-full text-center group">
                <div class="flex items-center justify-center gap-2">
                    <span class="text-4xl text-slate-500 font-mono font-light">₹</span>
                    <input id="amountInput" type="text" inputmode="numeric" placeholder="0" class="w-2/3 bg-transparent border-none outline-none text-6xl font-bold text-white text-center font-mono placeholder-slate-700 focus:placeholder-slate-800 transition-colors">
                </div>
                <div class="h-0.5 w-32 bg-gradient-to-r from-transparent via-fp-gold to-transparent mx-auto mt-4 opacity-50 group-focus-within:opacity-100 transition-opacity"></div>
            </div>

            <!-- Error Message -->
            <p id="errorMsg" class="text-xs text-fp-red mt-4 font-mono h-4 opacity-0 transition-opacity">Insufficient Balance</p>
            
            <!-- Balance Pill -->
            <div class="mt-6 bg-white/5 backdrop-blur-md px-4 py-2 rounded-full border border-white/10 flex items-center gap-2">
                <i class="fas fa-wallet text-slate-400 text-xs"></i>
                <span class="text-xs text-slate-300">Balance: <span id="demo-balance" class="font-bold text-white font-mono">₹...</span></span>
            </div>
        </div>

        <!-- Pay Button -->
        <div class="mt-auto pt-6">
            <button onclick="validateFunds()" class="w-full bg-gradient-to-r from-fp-gold to-orange-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-orange-500/20 active:scale-95 transition-all flex items-center justify-center gap-2 group relative overflow-hidden">
                <div class="absolute inset-0 bg-white/20 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700 skew-x-12"></div>
                <span>Proceed to Pay</span>
                <i class="fas fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
            </button>
        </div>

    </main>

    <!-- PIN Overlay (Initially Hidden) -->
    <div id="pinView" class="fixed inset-0 z-50 bg-fp-dark/95 backdrop-blur-xl flex flex-col items-center justify-end pb-8 transition-transform duration-300 translate-y-full">
        
        <!-- PIN Header -->
        <div class="flex-grow flex flex-col items-center justify-center w-full px-6">
            <div class="w-16 h-16 rounded-full bg-fp-surface border border-white/10 flex items-center justify-center text-fp-gold text-2xl mb-6 shadow-glow">
                <i class="fas fa-lock"></i>
            </div>
            <h3 class="text-white font-bold text-xl mb-2">Enter PIN</h3>
            <p class="text-slate-400 text-sm mb-8">Confirm payment of <span id="confirm-amount" class="text-white font-bold font-mono">₹0</span></p>
            
            <!-- PIN Dots -->
            <div class="flex gap-6 mb-12">
                <div class="pin-dot w-4 h-4 rounded-full border-2"></div>
                <div class="pin-dot w-4 h-4 rounded-full border-2"></div>
                <div class="pin-dot w-4 h-4 rounded-full border-2"></div>
                <div class="pin-dot w-4 h-4 rounded-full border-2"></div>
            </div>
        </div>

        <!-- Keypad -->
        <div class="grid grid-cols-3 gap-3 w-full max-w-sm px-6">
            <button class="keypad-btn h-16 text-2xl font-mono font-medium" onclick="addDigit(1)">1</button>
            <button class="keypad-btn h-16 text-2xl font-mono font-medium" onclick="addDigit(2)">2</button>
            <button class="keypad-btn h-16 text-2xl font-mono font-medium" onclick="addDigit(3)">3</button>
            <button class="keypad-btn h-16 text-2xl font-mono font-medium" onclick="addDigit(4)">4</button>
            <button class="keypad-btn h-16 text-2xl font-mono font-medium" onclick="addDigit(5)">5</button>
            <button class="keypad-btn h-16 text-2xl font-mono font-medium" onclick="addDigit(6)">6</button>
            <button class="keypad-btn h-16 text-2xl font-mono font-medium" onclick="addDigit(7)">7</button>
            <button class="keypad-btn h-16 text-2xl font-mono font-medium" onclick="addDigit(8)">8</button>
            <button class="keypad-btn h-16 text-2xl font-mono font-medium" onclick="addDigit(9)">9</button>
            <button class="keypad-btn h-16 text-xs font-bold text-slate-400 tracking-wider" onclick="cancelPayment()">CANCEL</button>
            <button class="keypad-btn h-16 text-2xl font-mono font-medium" onclick="addDigit(0)">0</button>
            <button class="keypad-btn h-16 text-slate-400" onclick="removeDigit()">
                <i class="fas fa-backspace"></i>
            </button>
        </div>
    </div>

    <!-- Success Overlay (Initially Hidden) -->
    <div id="successView" class="fixed inset-0 z-[60] bg-fp-dark flex flex-col items-center justify-center p-8 text-center hidden">
         <div class="relative mb-8">
             <div class="absolute inset-0 bg-fp-green/20 blur-3xl rounded-full"></div>
             <svg class="checkmark relative z-10" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52"> 
                <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none"/> 
                <path class="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/> 
             </svg>
         </div>
         <h2 class="text-3xl font-bold text-white mb-2">Payment Successful!</h2>
         <p class="text-slate-400 mb-8 font-mono text-sm">Trans ID: <span class="text-fp-gold">TXN88291039</span></p>
         
         <div class="glass-panel p-6 rounded-2xl w-full max-w-xs mb-8">
             <div class="flex justify-between mb-2">
                 <span class="text-slate-400 text-xs">Amount Paid</span>
                 <span class="text-white font-bold font-mono">₹<span id="success-amount-display">0</span></span>
             </div>
             <div class="flex justify-between">
                 <span class="text-slate-400 text-xs">Date</span>
                 <span class="text-white font-mono text-xs">Just Now</span>
             </div>
         </div>

         <a href="frampay.html"><button onclick="window.location.href='farmpay.html'" class="px-8 py-3 bg-white/10 text-white font-semibold rounded-xl hover:bg-white/20 border border-white/10 transition w-full max-w-xs">
             Done
         </button></a>
    </div>

    <!-- Failed Overlay (Initially Hidden) -->
    <div id="failedView" class="fixed inset-0 z-[60] bg-fp-dark/95 backdrop-blur-xl flex flex-col items-center justify-center p-8 text-center hidden">
        <div class="w-20 h-20 bg-red-500/10 rounded-full flex items-center justify-center mb-6 border border-red-500/20 shadow-[0_0_30px_rgba(239,68,68,0.2)]">
            <i class="fas fa-times text-3xl text-fp-red"></i>
        </div>
        <h2 class="text-2xl font-bold text-white mb-2">Payment Failed</h2>
        <p id="failReason" class="text-slate-400 mb-8 text-sm">Authentication failed. Incorrect PIN.</p>
        <button onclick="cancelPayment()" class="px-8 py-3 bg-fp-red text-white font-semibold rounded-xl hover:bg-red-600 shadow-lg shadow-red-900/20 w-full max-w-xs">
            Try Again
        </button>
   </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav fixed bottom-0 left-0 right-0 h-24 px-6 pb-2 flex justify-between items-center z-40">
        <button class="flex flex-col items-center gap-1.5 text-slate-500 w-16" onclick="window.location.href='farmpay(M).html'">
            <i class="fas fa-home text-xl mb-1"></i>
            <span class="text-[10px] font-bold">Home</span>
        </button>
        <button class="flex flex-col items-center gap-1.5 text-slate-500 w-16">
            <i class="fas fa-wallet text-xl mb-1"></i>
            <span class="text-[10px] font-bold">Cards</span>
        </button>
        <div class="relative w-16 flex justify-center">
            <button class="scan-fab animate-float">
                <i class="fas fa-qrcode text-white text-2xl"></i>
            </button>
        </div>
        <button class="flex flex-col items-center gap-1.5 text-fp-gold w-16">
            <i class="fas fa-paper-plane text-xl mb-1"></i>
            <span class="text-[10px] font-bold">Pay</span>
            <div class="w-1 h-1 rounded-full bg-fp-gold"></div>
        </button>
        <button class="flex flex-col items-center gap-1.5 text-slate-500 w-16">
            <i class="fas fa-cog text-xl mb-1"></i>
            <span class="text-[10px] font-bold">Menu</span>
        </button>
    </nav>

    <script>
        // === MOCK DATA SETUP ===
        if (!localStorage.getItem('farmpay_balance')) {
            localStorage.setItem('farmpay_balance', '5000');
        }
        if (!localStorage.getItem('saveaccounts')) {
            // Stores an account ending in 1234
            localStorage.setItem('saveaccounts', JSON.stringify([{ acNumber: '99999999991234' }]));
        }

        // === STATE MANAGEMENT ===
        const pinView = document.getElementById('pinView');
        const successView = document.getElementById('successView');
        const failedView = document.getElementById('failedView');
        const amountInput = document.getElementById('amountInput');
        const errorMsg = document.getElementById('errorMsg');
        
        let currentAmount = 0;
        let pin = "";
        
        // Display initial balance
        document.getElementById('demo-balance').textContent = '₹' + parseFloat(localStorage.getItem('farmpay_balance')).toLocaleString('en-IN');

        // Number Formatting
        amountInput.addEventListener('input', function(e) {
            errorMsg.style.opacity = '0';
            let value = e.target.value.replace(/,/g, '');
            if (isNaN(value)) value = value.replace(/[^0-9.]/g, '');
            if (value) {
                let parts = value.split('.');
                let integerPart = parts[0];
                let decimalPart = parts.length > 1 ? '.' + parts[1].slice(0, 2) : '';
                let lastThree = integerPart.substring(integerPart.length - 3);
                let otherNumbers = integerPart.substring(0, integerPart.length - 3);
                if (otherNumbers != '') lastThree = ',' + lastThree;
                e.target.value = otherNumbers.replace(/\B(?=(\d{2})+(?!\d))/g, ",") + lastThree + decimalPart;
            }
        });

        // Validate Funds
        function validateFunds() {
            const rawValue = amountInput.value.replace(/,/g, '');
            const balance = parseFloat(localStorage.getItem('farmpay_balance'));
            
            if(!rawValue || parseFloat(rawValue) <= 0) {
                errorMsg.textContent = "Please enter a valid amount";
                errorMsg.style.opacity = '1';
                return;
            }

            currentAmount = parseFloat(rawValue);

            if (currentAmount > balance) {
                errorMsg.textContent = "Insufficient Balance";
                errorMsg.style.opacity = '1';
                amountInput.parentElement.classList.add('animate-shake');
                setTimeout(() => amountInput.parentElement.classList.remove('animate-shake'), 400);
            } else {
                document.getElementById('confirm-amount').textContent = "₹" + amountInput.value;
                pinView.classList.remove('translate-y-full'); // Show PIN Pad
            }
        }

        // PIN Logic
        function addDigit(num) {
            if (pin.length < 4) {
                pin += num;
                updateDots();
                if (navigator.vibrate) navigator.vibrate(10); 
                if (pin.length === 4) {
                    setTimeout(verifyPayment, 300);
                }
            }
        }

        function removeDigit() {
            pin = pin.slice(0, -1);
            updateDots();
        }

        function updateDots() {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((dot, idx) => {
                if (idx < pin.length) dot.classList.add('filled');
                else dot.classList.remove('filled');
                dot.classList.remove('error');
            });
        }

        // Verify Payment
        function verifyPayment() {
            const accounts = JSON.parse(localStorage.getItem('saveaccounts(M)') || '[]');
            const isMatch = accounts.some(acc => acc.acNumber.toString().endsWith(pin));

            if (isMatch) {
                // SUCCESS
                const oldBalance = parseFloat(localStorage.getItem('farmpay_balance'));
                const newBalance = oldBalance - currentAmount;
                localStorage.setItem('farmpay_balance', newBalance);
                
                document.getElementById('demo-balance').textContent = '₹' + newBalance.toLocaleString('en-IN');
                document.getElementById('success-amount-display').textContent = currentAmount.toLocaleString('en-IN');
                
                playSuccessSound();
                successView.classList.remove('hidden');
                pinView.classList.add('translate-y-full'); // Hide PIN
            } else {
                // FAIL
                const dots = document.querySelectorAll('.pin-dot');
                dots.forEach(d => d.classList.add('error'));
                
                if (navigator.vibrate) navigator.vibrate([50, 50, 50]);

                setTimeout(() => {
                    pin = "";
                    updateDots();
                    failedView.classList.remove('hidden');
                    pinView.classList.add('translate-y-full');
                }, 400);
            }
        }

        function playSuccessSound() {
            // Using a simple upbeat notification sound via base64 to ensure it works without external CDN dependencies
            const successAudio = new Audio("data:audio/wav;base64,UklGRl9vT1BXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU"); // Placeholder for brevity, replaced below with functional chime
            
            // Functional simple chime (Base64 for a clean 'ding')
            // Using a hosted reliable sound as Base64 strings are too long for this snippet
            const audio = new Audio("https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3");
            audio.volume = 0.5;
            audio.play().catch(e => console.log("Audio play failed (user interaction needed first)", e));
        }

        function cancelPayment() {
            pinView.classList.add('translate-y-full');
            successView.classList.add('hidden');
            failedView.classList.add('hidden');
            
            pin = "";
            amountInput.value = "";
            currentAmount = 0;
            updateDots();
            errorMsg.style.opacity = '0';
        }
    </script>
</body>
</html>
