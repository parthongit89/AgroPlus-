<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>अ‍ॅग्रोरेकॉर्ड्स+ | सारांश</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <!-- Google Fonts including Marathi 'Mukta' -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Mukta:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'agro-purple': '#9333ea',
                        'agro-purple-dark': '#7e22ce',
                        'agro-accent': '#c084fc',
                        'agro-bg': '#f8fafc'
                    },
                    fontFamily: {
                        sans: ['Mukta', 'Plus Jakarta Sans', 'sans-serif'],
                        body: ['Mukta', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Mukta', 'Inter', sans-serif;
        }
        .record-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .record-card:active {
            transform: scale(0.98);
        }
        /* Hide scrollbar for clean look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="font-body text-slate-800 bg-slate-50 min-h-screen relative pb-24">

    <!-- Header -->
    <header class="bg-gradient-to-br from-purple-800 via-purple-600 to-fuchsia-600 pt-8 pb-12 px-6 rounded-b-[2rem] shadow-xl relative z-20">
        <div class="flex items-center justify-between mb-8">
            <button onclick="history.back()" class="bg-white/20 backdrop-blur-md p-2 rounded-xl text-white hover:bg-white/30 transition active:scale-95 border border-white/10">
                <i class="fas fa-arrow-left text-lg"></i>
            </button>
            <h1 class="text-white text-xl font-bold tracking-wide">अ‍ॅग्रोरेकॉर्ड्स<span class="font-light opacity-80">+</span></h1>
            <div class="w-10 h-10 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center text-white border border-white/10">
                 <i class="fas fa-user"></i>
            </div>
        </div>

        <!-- Search Bar Area -->
        <div class="flex gap-3">
            <div class="flex-1 bg-white/10 backdrop-blur-md border border-white/10 text-white h-12 rounded-2xl flex items-center px-4 shadow-lg">
                 <i class="fas fa-search opacity-70 mr-3"></i>
                 <input type="text" id="searchInput" onkeyup="filterRecords()" placeholder="रेकॉर्ड शोधा..." class="bg-transparent border-none outline-none text-white placeholder-purple-200 w-full font-medium">
            </div>
            <button class="w-12 h-12 bg-white text-agro-purple rounded-2xl flex items-center justify-center shadow-lg active:scale-95 transition">
                <i class="fas fa-sliders-h"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="px-5 pt-6 relative z-30 max-w-lg mx-auto">
        
        <div class="flex items-center justify-between mb-4 px-2">
            <h3 class="text-lg font-bold text-slate-700">अलीकडील रेकॉर्ड्स</h3>
            <button onclick="clearAllData()" class="text-xs font-bold text-red-400 hover:text-red-600">सर्व साफ करा</button>
        </div>

        <!-- List Container -->
        <div id="recordsList" class="space-y-4">
            <!-- JS will populate this -->
            <div class="text-center py-10 opacity-50">
                <i class="fas fa-spinner fa-spin text-2xl text-agro-purple"></i>
                <p class="text-sm mt-2">डेटा लोड होत आहे...</p>
            </div>
        </div>

    </main>

    <!-- Floating Action Button to Add New -->
    <a href="agrorecord1(M).html" class="fixed bottom-6 right-6 w-14 h-14 bg-gradient-to-r from-agro-purple to-fuchsia-600 rounded-full text-white shadow-xl shadow-purple-500/40 flex items-center justify-center text-2xl active:scale-90 transition z-50 hover:shadow-purple-500/60">
        <i class="fas fa-plus"></i>
    </a>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadRecords();
        });

        function loadRecords() {
            const listContainer = document.getElementById('recordsList');
            // Get data from LocalStorage
            const storedData = localStorage.getItem('agroRecords(M)');
            let records = [];

            if (storedData) {
                try {
                    records = JSON.parse(storedData);
                } catch(e) {
                    console.error("Error parsing data", e);
                }
            }

            // Fallback if empty (for demo purposes)
            if (records.length === 0) {
                listContainer.innerHTML = `
                    <div class="text-center py-10 text-slate-400">
                        <i class="fas fa-folder-open text-4xl mb-3 opacity-30"></i>
                        <p>कोणतेही रेकॉर्ड सापडले नाहीत.</p>
                        <p class="text-xs">जोडण्यासाठी + वर क्लिक करा.</p>
                    </div>
                `;
                return;
            }

            // Render
            renderList(records);
        }

        function renderList(records) {
            const listContainer = document.getElementById('recordsList');
            listContainer.innerHTML = '';

            records.forEach(rec => {
                const card = document.createElement('div');
                card.className = 'record-card bg-white p-3 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4';
                
                // Image fallback
                const imgSource = rec.image ? rec.image : generateAvatar(rec.name);

                // Check if image is base64 or a placeholder div
                let imgHTML = '';
                if(rec.image && rec.image.startsWith('data:image')) {
                    imgHTML = `<img src="${rec.image}" class="w-full h-full object-cover">`;
                } else {
                    imgHTML = `<div class="w-full h-full bg-purple-100 flex items-center justify-center text-agro-purple text-xs font-bold">${rec.name.charAt(0)}</div>`;
                }

                card.innerHTML = `
                    <div class="w-16 h-16 rounded-xl bg-slate-50 flex-shrink-0 overflow-hidden shadow-inner relative">
                         ${imgHTML}
                    </div>
                    <div class="flex-1 min-w-0">
                        <h4 class="font-bold text-slate-800 truncate text-base">${rec.name}</h4>
                        <p class="text-xs text-slate-500 truncate">${rec.type} • ${rec.duration}</p>
                        <div class="flex items-center gap-2 mt-1">
                             <span class="text-[10px] text-agro-purple bg-purple-50 px-2 py-0.5 rounded-md font-semibold border border-purple-100">
                                <i class="far fa-calendar-alt mr-1"></i> ${rec.date}
                             </span>
                        </div>
                    </div>
                    <div class="text-right flex flex-col items-end justify-between self-stretch py-1">
                        <span class="text-[10px] font-bold text-slate-400 bg-slate-100 px-1.5 rounded">#${rec.id}</span>
                        <div class="text-agro-purple/50"><i class="fas fa-chevron-right"></i></div>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        function filterRecords() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const storedData = localStorage.getItem('agroRecords(M)');
            if(!storedData) return;
            
            const records = JSON.parse(storedData);
            const filtered = records.filter(rec => 
                rec.name.toLowerCase().includes(query) || 
                rec.type.toLowerCase().includes(query) ||
                rec.id.includes(query)
            );
            renderList(filtered);
        }

        function clearAllData() {
            if(confirm('सर्व रेकॉर्ड हटवायचे?')) {
                localStorage.removeItem('agroRecords(M)');
                loadRecords();
            }
        }

        function generateAvatar(name) {
            return null; // Logic handled in HTML generation
        }
    </script>
</body>
</html>
