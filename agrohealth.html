    <!-- Custom config for Tailwind colors and fonts -->
    <script>
        tailwind.config = {
            theme: {

                        'agro-bg': '#f3f4f6', // Light gray background

    <style>
        body {
            background-color: #f3f4f6;
            font-family: 'Inter', sans-serif; /* Default body font */
        }

        /* Responsive Image Grid for Pests/Diseases */
        .pest-grid {
            /* 2 columns on mobile for better visibility of images */
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem; /* 4 units of Tailwind gap */
        }
        /* On medium screens (md) and up, expand to 3 columns */
        @media (min-width: 768px) {
            .pest-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        /* Individual Pest Card Styling */
        .pest-item {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1; /* Makes the card square */
            overflow: hidden;
            border-radius: 0.75rem; /* rounded-xl */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1); /* shadow-lg */
            cursor: pointer;
            transition: all 0.3s ease-in-out;
        }
        .pest-item:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1); /* hover:shadow-xl */
        }
        .pest-item:active {
            transform: scale(0.98);
        }
        
        /* Image Placeholder Style */
        .pest-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Green band at the bottom of the image (Now a button container) */
        .pest-band {
            /* Positioned over the bottom of the image */
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            /* Flex container for the button */
            display: flex;
            justify-content: flex-end; /* Align button to the right */
            align-items: center;
            padding: 0.5rem; /* Give it some height/padding */
            background-color: #1e3a24d9; /* agro-dark with 85% opacity */
            z-index: 15; /* Ensure it's above the image */
            /* Ensure the bottom corners match the card's rounded corners */
            border-bottom-left-radius: 0.75rem;
            border-bottom-right-radius: 0.75rem;
        }

        /* Premium Feature Button Style */
        .premium-btn {
            width: 100%;
            padding: 1rem 1rem; /* py-4 px-4 */
            border-radius: 0.75rem; /* rounded-xl */
            color: white;
            font-weight: 700; /* font-bold */
            font-size: 1.125rem; /* text-lg */
            margin-bottom: 0.75rem; /* mb-3 */
            display: flex;
            align-items: center;
            transition: all 0.3s;

            /* Gradient Border Setup */
            position: relative;
            border: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 10;
            background-clip: padding-box;
        }

        /* Gradient Border Pseudo-element (Green + Gold + Purple Mix) */
        .premium-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            margin: -2px; /* Border thickness */
            border-radius: 0.85rem; /* Slightly larger than content rounded-xl (0.75rem) */
            /* Gradient: Green (agro-light), Gold (agro-gold), Purple (agro-purple) */
            background: linear-gradient(90deg, var(--colors-agro-light), var(--colors-agro-gold), var(--colors-agro-purple));
            z-index: -1;
        }
        
        .premium-btn:hover {
            opacity: 0.95;
        }
        .premium-btn:active {
            transform: scale(0.99);
        }
    </style>
</head>

    <!-- Simple Message Box for Clicks (Notification style - STRICTLY COPIED) -->
    <div id="message-box" class="fixed bottom-4 left-4 right-4 bg-agro-dark text-white p-3 rounded-lg shadow-xl hidden transition transform duration-300 z-30" role="alert">
        <p id="message-content" class="text-center"></p>
    </div>

    <!-- JAVASCRIPT BLOCK (STRICTLY COPIED) -->
    <script>
        /**
         * Shows a temporary notification message at the bottom of the screen.
         * @param {string} content The message to display.
         */
        function showMessage(content) {
            const messageBox = document.getElementById('message-box');
            const messageContent = document.getElementById('message-content');
            
            messageContent.textContent = content;
            messageBox.classList.remove('hidden');
            
            clearTimeout(messageBox.timer);
            
            messageBox.timer = setTimeout(() => {
                messageBox.classList.add('hidden');
            }, 2000);
        }

        // No dynamic data generation needed for this fixed layout.
    </script>
