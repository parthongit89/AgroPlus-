<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ॲग्रोरेकॉर्ड्स+ | माहिती जोडा</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'agro-purple': '#9333ea',
                        'agro-purple-dark': '#7e22ce',
                        'agro-accent': '#c084fc',
                    },
                    fontFamily: {
                        sans: ['Noto Sans Devanagari', 'Plus Jakarta Sans', 'sans-serif'],
                        body: ['Noto Sans Devanagari', 'Inter', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 4px 20px rgba(147, 51, 234, 0.1)',
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        
        .pill-input-container {
            display: flex; align-items: center; width: 100%; position: relative;
        }
        .pill-label {
            background: linear-gradient(135deg, #9333ea 0%, #7e22ce 100%);
            color: white; padding: 0.75rem 1.5rem; border-radius: 9999px;
            font-weight: 600; z-index: 10; width: 40%; text-align: center;
            font-size: 0.9rem; white-space: nowrap;
            box-shadow: 2px 0 8px rgba(147, 51, 234, 0.25);
        }
        .pill-field {
            background-color: white; border: 1px solid #e9d5ff;
            border-radius: 0 9999px 9999px 0; padding: 0.75rem 1rem 0.75rem 2rem;
            width: 70%; margin-left: -20px; outline: none; transition: all 0.3s ease;
            color: #581c87;
        }
        .pill-field:focus { border-color: #9333ea; box-shadow: 0 0 0 3px rgba(147, 51, 234, 0.15); }
        .camera-trigger {
            background: linear-gradient(135deg, #9333ea 0%, #c084fc 100%);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .camera-trigger:active { transform: scale(0.98); }
        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="font-body text-slate-800 min-h-screen relative pb-20 bg-slate-50">

    <!-- Header -->
    <header class="bg-gradient-to-br from-purple-800 via-purple-600 to-fuchsia-600 pt-8 pb-16 px-6 rounded-b-[2.5rem] shadow-xl relative z-20">
        <div class="flex items-center justify-between">
            <!-- Back button goes to Summary now if desired, or history back -->
            <button onclick="history.back()" class="bg-white/20 backdrop-blur-md p-2 rounded-xl text-white border border-white/10">
                <a href="home page(M).html"><i class="fas fa-arrow-left text-lg"></i></a> 
            </button>
            <div class="text-center">
                <h1 class="text-white text-xl font-bold tracking-wide">ॲग्रोरेकॉर्ड्स<span class="font-light opacity-80">+</span></h1>
            </div>
            <div class="w-10 h-10 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center text-white border border-white/10">
                 <a href="profile(M).html"><i class="fas fa-user"></i></a>
            </div>
        </div>
    </header>

    <main class="px-5 -mt-8 relative z-30 max-w-lg mx-auto">
        
        <!-- VIEW 1: CAMERA -->
        <div id="cameraView" class="bg-white/90 backdrop-blur-sm rounded-3xl p-8 shadow-soft text-center fade-in border border-purple-50">
            <div class="mb-8">
                <div class="w-24 h-24 bg-purple-50 rounded-full flex items-center justify-center mx-auto mb-6 text-agro-purple ring-4 ring-purple-50">
                    <i class="fas fa-camera text-4xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800 mb-2">रेकॉर्ड कॅप्चर करा</h2>
                <p class="text-slate-500 text-sm">माहिती आपोआप भरण्यासाठी कॅमेरा कागदपत्रावर धरा.</p>
            </div>
            <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden" onchange="handleImageCapture(this)">
            <label for="cameraInput" class="camera-trigger w-full block py-4 rounded-2xl text-white font-bold text-lg cursor-pointer shadow-lg shadow-purple-500/30 flex items-center justify-center gap-3">
                <i class="fas fa-shutter text-xl"></i>
                <span>कॅमेरा उघडा</span>
            </label>
        </div>

        <!-- VIEW 2: FORM (Hidden initially) -->
        <div id="formView" class="hidden fade-in">
            <div class="flex justify-between items-center mb-6">
                <div class="bg-gradient-to-r from-agro-purple to-agro-purple-dark text-white pl-4 pr-1 py-1.5 rounded-lg rounded-tl-2xl shadow-lg flex items-center gap-3">
                    <span class="text-xs font-bold tracking-wider uppercase">रेकॉर्ड क्र.</span>
                    <input id="inputRecordNo" type="text" value="001" class="w-14 bg-white text-agro-purple font-bold text-center rounded py-1 outline-none text-sm" readonly>
                </div>
            </div>

            <div class="space-y-6">
                <div class="pill-input-container">
                    <div class="pill-label">वस्तूचे नाव</div>
                    <input id="inputName" type="text" class="pill-field" placeholder="उदा. खत A">
                </div>
                <div class="pill-input-container">
                    <div class="pill-label">वस्तूचा प्रकार</div>
                    <input id="inputType" type="text" class="pill-field" placeholder="उदा. सेंद्रिय">
                </div>
                <div class="flex gap-3">
                    <div class="pill-input-container">
                        <div class="pill-label text-xs px-1 w-[45%]">तारीख</div>
                        <input id="inputDate" type="date" class="pill-field text-sm">
                    </div>
                    <div class="pill-input-container">
                        <div class="pill-label text-xs px-1 w-[45%]">कालावधी</div>
                        <input id="inputDuration" type="text" class="pill-field text-sm" placeholder="२ तास">
                    </div>
                </div>

                <!-- Preview -->
                <div class="relative w-full aspect-video bg-purple-50 rounded-3xl border-2 border-dashed border-purple-300 flex flex-col items-center justify-center overflow-hidden">
                    <img id="previewImage" class="absolute inset-0 w-full h-full object-cover hidden">
                    <div id="previewPlaceholder" class="text-center p-4">
                        <i class="fas fa-image text-agro-purple text-2xl mb-2"></i>
                        <p class="text-purple-900 text-sm font-semibold">इमेज प्रिव्ह्यू</p>
                    </div>
                    <button onclick="retakePhoto()" class="absolute bottom-3 right-3 bg-white/80 text-agro-purple text-xs font-bold px-3 py-1 rounded-lg shadow-sm">पुन्हा घ्या</button>
                </div>

                <div class="flex justify-end pt-4 pb-8">
                    <button onclick="submitForm()" class="bg-gradient-to-r from-agro-purple to-fuchsia-600 text-white text-lg font-bold py-4 px-12 rounded-full shadow-lg shadow-purple-500/30 active:scale-95 transition flex items-center gap-3">
                        <span>रेकॉर्ड सबमिट करा</span>
                        <i class="fas fa-paper-plane text-sm"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Loading Modal -->
    <div id="savingModal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white p-6 rounded-2xl flex flex-col items-center">
            <i class="fas fa-circle-notch fa-spin text-agro-purple text-3xl mb-3"></i>
            <p class="font-bold text-slate-700">डेटा जतन करत आहे...</p>
        </div>
    </div>

    <script>
        let currentImage = null;

        function handleImageCapture(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentImage = e.target.result;
                    document.getElementById('previewImage').src = currentImage;
                    document.getElementById('previewImage').classList.remove('hidden');
                    document.getElementById('previewPlaceholder').classList.add('hidden');
                    
                    // Delay to show user the capture before switching
                    setTimeout(() => {
                        document.getElementById('cameraView').classList.add('hidden');
                        document.getElementById('formView').classList.remove('hidden');
                        document.getElementById('inputDate').valueAsDate = new Date();
                    }, 500);
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function retakePhoto() {
            document.getElementById('cameraInput').value = '';
            document.getElementById('formView').classList.add('hidden');
            document.getElementById('cameraView').classList.remove('hidden');
        }

        function submitForm() {
            // 1. Show Loading
            const modal = document.getElementById('savingModal');
            modal.classList.remove('hidden');

            // 2. Gather Data
            const newRecord = {
                id: document.getElementById('inputRecordNo').value,
                name: document.getElementById('inputName').value || 'Unnamed Item',
                type: document.getElementById('inputType').value || 'General',
                date: document.getElementById('inputDate').value || new Date().toISOString().split('T')[0],
                duration: document.getElementById('inputDuration').value || '-',
                image: currentImage
            };

            // 3. Save to LocalStorage
            // Get existing records or initialize empty array
            const existingData = localStorage.getItem('agroRecords');
            let records = existingData ? JSON.parse(existingData) : [];
            
            // Add new record to beginning
            records.unshift(newRecord);

            // Save back
            try {
                localStorage.setItem('agroRecords', JSON.stringify(records));
            } catch (e) {
                alert('स्टोरेज पूर्ण! इमेज खूप मोठी असू शकते. इमेजशिवाय जतन करत आहे.');
                newRecord.image = null;
                records[0] = newRecord;
                localStorage.setItem('agroRecords', JSON.stringify(records));
            }

            // 4. Redirect to Summary Page
            setTimeout(() => {
                window.location.href = 'summary.html';
            }, 800);
        }

        // Random ID on load
        document.addEventListener('DOMContentLoaded', () => {
             document.getElementById('inputRecordNo').value = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
        });
    </script>
</body>
</html>
