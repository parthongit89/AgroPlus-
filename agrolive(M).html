<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ॲग्रोप्लस | कृषी अपडेट्स</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Tiro+Devanagari+Marathi&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'agro-purple': '#9333ea', 
                        'agro-purple-dark': '#7e22ce',
                    },
                    fontFamily: {
                        sans: ['Noto Sans Devanagari', 'Plus Jakarta Sans', 'sans-serif'],
                        marathi: ['"Tiro Devanagari Marathi"', 'serif'],
                    },
                    animation: {
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'shimmer': 'shimmer 2s linear infinite',
                        'slide-up': 'slideUp 0.3s ease-out forwards',
                    },
                    keyframes: {
                        shimmer: {
                            '0%': { backgroundPosition: '-1000px 0' },
                            '100%': { backgroundPosition: '1000px 0' }
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(10px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        
        .glass-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .category-chip { transition: all 0.2s; }
        .category-chip.active {
            background-color: #1e293b; /* Slate-800 */
            color: white;
            border-color: #1e293b;
            box-shadow: 0 4px 12px rgba(30, 41, 59, 0.2);
        }

        /* Skeleton Loader */
        .skeleton {
            background: #f1f5f9;
            background-image: linear-gradient(to right, #f1f5f9 0%, #e2e8f0 20%, #f1f5f9 40%, #f1f5f9 100%);
            background-repeat: no-repeat;
            background-size: 1000px 100%; 
            animation: shimmer 1.5s infinite linear forwards;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="font-sans text-slate-800 pb-24 bg-slate-50">

    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-50 glass-header pt-4 pb-2 px-6">
        <div class="flex items-center justify-between mb-4">
            <button onclick="history.back()" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 active:scale-95 transition hover:bg-slate-200">
                <a href="home page(M).html"><i class="fas fa-arrow-left"></i></a>
            </button>
            <h1 class="text-xl font-bold text-slate-800 tracking-tight">थेट अपडेट्स</h1>
            <div class="relative">
                <button class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 active:scale-95 transition hover:bg-slate-200">
                    <i class="far fa-bell"></i>
                </button>
                <span class="absolute top-2.5 right-3 w-2 h-2 bg-red-500 rounded-full border border-white"></span>
            </div>
        </div>

        <!-- Meta Bar -->
        <div class="flex justify-between items-center text-[10px] uppercase font-bold text-slate-400 px-1 tracking-wider">
            <span id="current-date">तारीख मिळवत आहे...</span>
            <div class="flex items-center gap-1 text-green-600 bg-green-50 px-2 py-0.5 rounded-full">
                <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                <span>थेट फीड</span>
            </div>
        </div>

        <!-- Category Tabs -->
        <div class="flex gap-2 overflow-x-auto py-3 -mx-6 px-6 no-scrollbar mt-1">
            <button class="category-chip active px-4 py-2 rounded-full text-xs font-bold bg-white border border-slate-200 text-slate-500 flex-shrink-0" onclick="loadNews('all', this)">
                सर्व स्रोत
            </button>
            <button class="category-chip px-4 py-2 rounded-full text-xs font-bold bg-white border border-slate-200 text-slate-500 flex-shrink-0" onclick="loadNews('govt', this)">
                🏛️ सरकारी योजना
            </button>
            <button class="category-chip px-4 py-2 rounded-full text-xs font-bold bg-white border border-slate-200 text-slate-500 flex-shrink-0" onclick="loadNews('market', this)">
                📈 बाजार भाव
            </button>
            <button class="category-chip px-4 py-2 rounded-full text-xs font-bold bg-white border border-slate-200 text-slate-500 flex-shrink-0" onclick="loadNews('weather', this)">
                ⛈️ हवामान अंदाज
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="px-5 mt-40 space-y-5 min-h-screen" id="news-feed">
        <!-- Content injected by JS -->
    </main>

    <!-- Floating Refresh Button -->
    <button onclick="refreshFeed()" class="fixed bottom-6 right-6 w-14 h-14 bg-slate-900 rounded-full text-white shadow-xl shadow-slate-900/30 flex items-center justify-center text-xl active:scale-90 transition z-40 group">
        <i class="fas fa-sync-alt group-hover:rotate-180 transition duration-500"></i>
    </button>

    <script>
        // --- MOCK DATABASE ---
        const NEWS_DB = [
            {
                id: 1,
                category: 'weather',
                source: 'mausam.imd.gov.in',
                time: '१२ मिनिटांपूर्वी',
                title: 'मुसळधार पावसाचा इशारा: ऑरेंज अलर्ट',
                desc: 'हवामान खात्याने पालघर, नाशिक आणि ठाणे जिल्ह्यांसाठी पुढील ४८ तासांसाठी ऑरेंज अलर्ट जारी केला आहे. कापणी केलेले पीक त्वरित झाकून ठेवावे.',
                tag: 'गंभीर',
                tagColor: 'red',
                icon: 'fa-cloud-bolt',
                iconBg: 'bg-blue-50',
                iconColor: 'text-blue-600',
                isHero: true
            },
            {
                id: 2,
                category: 'govt',
                source: 'pmkisan.gov.in',
                time: '२ तासांपूर्वी',
                title: 'पीएम किसान १६ व्या हप्त्याची स्थिती',
                desc: 'पुढील ₹२००० चा हप्ता २८ फेब्रुवारी रोजी जमा होईल. अपयश टाळण्यासाठी पोर्टलवर ई-केवायसी स्थिती तपासा.',
                tag: 'सबसिडी',
                tagColor: 'green',
                icon: 'fa-landmark',
                iconBg: 'bg-purple-50',
                iconColor: 'text-purple-600',
                isHero: false
            },
            {
                id: 3,
                category: 'market',
                source: 'enam.gov.in',
                time: '४ तासांपूर्वी',
                title: 'लातूर APMC मध्ये सोयाबीनचे भाव वधारले',
                desc: 'उच्च निर्यात मागणीमुळे आज सोयाबीनचा सरासरी भाव ₹४,८५०/क्विंटलवर पोहोचला. हा कल कायम राहण्याची शक्यता आहे.',
                tag: '₹४,८५० ▲',
                tagColor: 'green',
                icon: 'fa-chart-line',
                iconBg: 'bg-green-50',
                iconColor: 'text-green-600',
                isHero: false
            },
            {
                id: 4,
                category: 'govt',
                source: 'mahadbt.maharashtra.gov.in',
                title: 'ट्रॅक्टर अनुदान योजना',
                desc: 'महाडीबीटी पोर्टलवर कृषी यांत्रिकीकरण योजनेअंतर्गत ट्रॅक्टर आणि अवजारे खरेदीसाठी अर्ज प्रक्रिया सुरू झाली आहे.',
                time: '१ दिवसापूर्वी',
                tag: 'महाराष्ट्र',
                tagColor: 'orange',
                icon: 'fa-tractor',
                iconBg: 'bg-orange-50',
                iconColor: 'text-orange-600',
                isHero: false
            },
            {
                id: 5,
                category: 'weather',
                source: 'agromet.imd.gov.in',
                title: 'अवकाळी गारपिटीचा इशारा',
                desc: 'विदर्भातील काही भागात हलकी गारपीट होण्याचा अंदाज. द्राक्ष आणि संत्रा उत्पादक शेतकऱ्यांनी गारपीटविरोधी जाळ्या वापरण्याचा सल्ला.',
                time: '६ तासांपूर्वी',
                tag: 'सल्ला',
                tagColor: 'blue',
                icon: 'fa-snowflake',
                iconBg: 'bg-cyan-50',
                iconColor: 'text-cyan-600',
                isHero: false
            }
        ];

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', () => {
            // Set Date
            const now = new Date();
            // Simple date formatting for Marathi context
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            // Using en-IN with Marathi text logic or simplified display
            // Ideally use 'mr-IN' if supported, but manual string is safer for simple demo
            const dateStr = now.toLocaleDateString('mr-IN', options);
            document.getElementById('current-date').innerText = dateStr;
            
            // Initial Load
            loadNews('all', document.querySelector('.category-chip.active'));
        });

        // --- CORE FUNCTIONS ---

        function loadNews(filter, btn) {
            // 1. Update Tabs UI
            if(btn) {
                document.querySelectorAll('.category-chip').forEach(c => {
                    c.classList.remove('active', 'bg-slate-900', 'text-white');
                    c.classList.add('bg-white', 'text-slate-500');
                });
                btn.classList.remove('bg-white', 'text-slate-500');
                btn.classList.add('active');
            }

            const container = document.getElementById('news-feed');
            
            // 2. Show Skeleton Loading State
            container.innerHTML = generateSkeletonHTML();

            // 3. Simulate Network Fetch Delay (800ms)
            setTimeout(() => {
                const filteredData = filter === 'all' 
                    ? NEWS_DB 
                    : NEWS_DB.filter(item => item.category === filter);
                
                renderNews(filteredData, container);
            }, 800);
        }

        function refreshFeed() {
            const activeBtn = document.querySelector('.category-chip.active');
            // Spin icon logic could go here
            let filterType = 'all';
            const txt = activeBtn.innerText;
            if(txt.includes('सरकारी')) filterType = 'govt';
            else if(txt.includes('बाजार')) filterType = 'market';
            else if(txt.includes('हवामान')) filterType = 'weather';
            
            loadNews(filterType, null);
        }

        function renderNews(data, container) {
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 opacity-50">
                        <i class="fas fa-newspaper text-4xl mb-2 text-slate-300"></i>
                        <p class="text-sm text-slate-400">या श्रेणीसाठी कोणतेही अपडेट सापडले नाहीत.</p>
                    </div>`;
                return;
            }

            data.forEach((item, index) => {
                const delay = index * 0.1; // Staggered animation
                
                if (item.isHero) {
                    // Render Hero Card
                    container.innerHTML += `
                        <div class="bg-gradient-to-br from-red-500 to-rose-600 rounded-[2rem] p-6 text-white shadow-xl shadow-rose-500/20 relative overflow-hidden group cursor-pointer animate-slide-up" style="animation-delay: ${delay}s">
                            <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:scale-110 transition duration-500">
                                <i class="fas ${item.icon} text-8xl"></i>
                            </div>
                            <div class="relative z-10">
                                <div class="flex items-center justify-between mb-3">
                                    <div class="flex items-center gap-2">
                                        <span class="bg-white/20 backdrop-blur-md px-2 py-1 rounded-lg text-[10px] font-bold uppercase tracking-wider border border-white/10">${item.tag}</span>
                                        <span class="text-[10px] opacity-75 font-medium"><i class="fas fa-globe-asia mr-1"></i> ${item.source}</span>
                                    </div>
                                    <span class="text-xs font-bold opacity-90">${item.time}</span>
                                </div>
                                <h2 class="text-2xl font-black leading-tight mb-2">${item.title}</h2>
                                <p class="text-sm opacity-90 leading-relaxed mb-4 line-clamp-3">${item.desc}</p>
                                <div class="flex items-center gap-2 text-xs font-bold bg-white/10 w-fit px-4 py-2 rounded-full backdrop-blur-sm border border-white/10">
                                    संपूर्ण सल्ला वाचा <i class="fas fa-arrow-right ml-1"></i>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    // Render Standard Card
                    container.innerHTML += `
                        <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex gap-4 animate-slide-up hover:shadow-md transition cursor-pointer" style="animation-delay: ${delay}s">
                            <div class="w-12 h-12 rounded-2xl ${item.iconBg} flex items-center justify-center ${item.iconColor} text-xl flex-shrink-0 shadow-sm">
                                <i class="fas ${item.icon}"></i>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex justify-between items-start mb-1">
                                    <div class="flex items-center gap-2 overflow-hidden">
                                        <span class="text-[9px] font-bold uppercase tracking-wide text-slate-400 truncate bg-slate-50 px-1.5 rounded border border-slate-100 max-w-[120px]">${item.source}</span>
                                    </div>
                                    <span class="text-[10px] text-slate-400 whitespace-nowrap font-medium">${item.time}</span>
                                </div>
                                <h4 class="font-bold text-slate-800 text-sm leading-snug mb-1 truncate">${item.title}</h4>
                                <p class="text-xs text-slate-500 line-clamp-2 leading-relaxed">${item.desc}</p>
                                <div class="mt-3 flex gap-2">
                                    <span class="text-[10px] ${getTagStyle(item.tagColor)} px-2 py-0.5 rounded border font-bold">${item.tag}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });
        }

        function getTagStyle(color) {
            const styles = {
                'green': 'bg-green-50 text-green-700 border-green-100',
                'red': 'bg-red-50 text-red-700 border-red-100',
                'blue': 'bg-blue-50 text-blue-700 border-blue-100',
                'purple': 'bg-purple-50 text-purple-700 border-purple-100',
                'orange': 'bg-orange-50 text-orange-700 border-orange-100',
            };
            return styles[color] || styles['green'];
        }

        function generateSkeletonHTML() {
            // Returns HTML for 3-4 skeleton cards
            return Array(4).fill(0).map(() => `
                <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-slate-100 skeleton flex-shrink-0"></div>
                    <div class="flex-1 space-y-2 py-1">
                        <div class="flex justify-between">
                            <div class="h-3 bg-slate-100 skeleton rounded w-1/3"></div>
                            <div class="h-3 bg-slate-100 skeleton rounded w-10"></div>
                        </div>
                        <div class="h-4 bg-slate-100 skeleton rounded w-3/4"></div>
                        <div class="h-3 bg-slate-100 skeleton rounded w-full"></div>
                        <div class="h-3 bg-slate-100 skeleton rounded w-16 mt-2"></div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
