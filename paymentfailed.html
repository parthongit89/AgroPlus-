<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Failed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-red-50 h-screen flex flex-col items-center justify-center text-center px-6">

    <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mb-6 animate-bounce">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
    </div>

    <h1 class="text-2xl font-bold text-slate-800 mb-2">Payment Failed</h1>
    <p id="failReason" class="text-slate-500 mb-8 max-w-xs mx-auto">Something went wrong with your transaction.</p>

    <div class="space-y-3 w-full max-w-xs">
        <button onclick="window.history.back()" class="w-full bg-red-500 text-white px-8 py-3 rounded-xl font-semibold shadow-lg shadow-red-200 hover:bg-red-600 transition">
           Try Again
        </button>
        <a href="frampay.html"><button onclick="window.location.href='farmpay.html'" class="w-full bg-transparent text-slate-500 px-8 py-3 rounded-xl font-semibold hover:bg-red-100 transition">
            Cancel
        </button></a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const reason = params.get('reason');
            const msgEl = document.getElementById('failReason');

            if (reason === 'funds') {
                msgEl.innerText = "Insufficient funds in your main wallet to complete this transaction.";
            } else if (reason === 'auth') {
                msgEl.innerText = "Authentication Failed. The PIN entered does not match any linked bank account.";
            }
        });
    </script>
</body>
</html>
