<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrochat+</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts - Plus Jakarta Sans (for Header) & Inter (for Body) -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        body: ['Inter', 'sans-serif']
                    },
                    colors: {
                        agro: {
                            500: '#00C853', // Brand Color matching Agromart+
                            600: '#43A047',
                        }
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.08)',
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom scrollbar for webkit */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        .btn-hover:active {
            transform: scale(0.95);
        }
        
        /* Smooth Fade In */
        .fade-in { animation: fadeIn 0.3s ease-out forwards; opacity: 0; transform: translateY(5px); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center bg-slate-100">

    <!-- Mobile Container (Phone Frame) -->
    <div class="w-full h-full sm:h-[85vh] sm:w-[400px] sm:rounded-3xl sm:shadow-2xl bg-white flex flex-col overflow-hidden relative border-gray-200 sm:border">
        
        <!-- HEADER (Updated to match Agromart+ exactly) -->
        <!-- Used rounded-br-[5rem] and specific padding to replicate the leaf shape -->
        <header class="bg-agro-500 pt-8 px-6 pb-12 flex justify-between items-center shadow-lg relative z-10 rounded-br-[5rem] shrink-0">
            <!-- Left Icon -->
            <a href="home page.html" class="text-white hover:text-green-100 transition transform hover:-translate-x-1">
                 <i class="fa-solid fa-arrow-left text-xl"></i>
            </a>
            
            <!-- Center Title -->
            <div class="text-center">
                <!-- Using font-sans to match the Plus Jakarta Sans of Agromart+ -->
                <h1 class="text-white text-3xl font-sans font-normal tracking-wide">Agrochat+</h1>
            </div>
    
            <!-- Right Icon -->
            <a href="profile.html" class="text-white hover:text-green-100 transition transform hover:scale-110" aria-label="User Profile">
                <i class="fa-solid fa-circle-user text-3xl"></i>
            </a>
        </header>

        <!-- Chat Area -->
        <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-6 scrollbar-hide bg-white -mt-4 pt-8 relative z-0">
            <!-- Timestamp -->
            <div class="text-center text-xs text-gray-400 my-2">Today</div>

            <!-- Received Message (Left) -->
            <div class="flex justify-start fade-in">
                <div class="bg-gray-100 text-gray-800 rounded-2xl rounded-tl-none py-3 px-5 max-w-[80%] text-[15px] leading-relaxed shadow-sm">
                   Hello! How is your crop yield this season?
                </div>
            </div>

            <!-- Sent Message (Right) -->
            <div class="flex justify-end fade-in">
                <div class="bg-agro-50 text-gray-800 rounded-2xl rounded-tr-none py-3 px-5 max-w-[80%] text-[15px] leading-relaxed shadow-sm border border-agro-100/50">
                    It's going well, but I'm worried about the upcoming rain.
                </div>
            </div>

            <!-- Received Message (Left) -->
            <div class="flex justify-start fade-in">
                <div class="bg-gray-100 text-gray-800 rounded-2xl rounded-tl-none py-3 px-5 max-w-[80%] text-[15px] leading-relaxed shadow-sm">
                    Have you checked the soil moisture levels recently?
                </div>
            </div>
            
            <!-- Dynamic messages will appear here -->
        </main>

        <!-- Footer / Input Area -->
        <footer class="p-4 bg-white border-t border-gray-100 shrink-0 z-20">
            <div class="flex items-center gap-3">
                <!-- More Options Button -->
                <button class="btn-hover bg-gray-100 text-gray-600 h-12 w-12 rounded-full flex items-center justify-center shrink-0 hover:bg-gray-200 transition">
                    <i class="fa-solid fa-ellipsis text-xl"></i>
                </button>

                <!-- Input Field -->
                <div class="flex-1 relative">
                    <input type="text" id="message-input" 
                        class="w-full bg-gray-100 text-gray-700 placeholder-gray-400 rounded-full py-3 pl-5 pr-10 focus:outline-none focus:ring-2 focus:ring-agro-500/50 transition font-body text-sm"
                        placeholder="Type your query...">
                    
                    <!-- Paperclip Icon inside input -->
                    <button class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 p-1">
                        <i class="fa-solid fa-paperclip text-lg"></i>
                    </button>
                </div>

                <!-- Send Button -->
                <button id="send-btn" class="btn-hover bg-agro-500 text-white h-12 w-12 rounded-full flex items-center justify-center shrink-0 shadow-lg shadow-green-500/30 hover:bg-agro-600 transition">
                    <i class="fa-solid fa-paper-plane text-sm pr-0.5"></i> 
                </button>
            </div>
        </footer>

    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        // Function to add a new message
        function addMessage(text, isSent = true) {
            if (!text.trim()) return;

            const messageWrapper = document.createElement('div');
            messageWrapper.className = isSent ? 'flex justify-end fade-in mb-4' : 'flex justify-start fade-in mb-4';
            
            const bubble = document.createElement('div');
            // Differentiate styles for sent/received for better UX
            if (isSent) {
                bubble.className = 'bg-agro-50 text-gray-800 rounded-2xl rounded-tr-none py-3 px-5 max-w-[80%] text-[15px] leading-relaxed shadow-sm border border-agro-100/50';
            } else {
                bubble.className = 'bg-gray-100 text-gray-800 rounded-2xl rounded-tl-none py-3 px-5 max-w-[80%] text-[15px] leading-relaxed shadow-sm';
            }
            
            bubble.textContent = text;
            messageWrapper.appendChild(bubble);
            chatContainer.appendChild(messageWrapper);

            // Scroll to bottom
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Handle Send Click
        sendBtn.addEventListener('click', () => {
            const text = messageInput.value;
            if (text) {
                addMessage(text, true); // User sent
                messageInput.value = '';
                
                // Simulate simple bot reply
                setTimeout(() => {
                    const replies = [
                        "That's interesting! Tell me more.",
                        "I can help you with crop analysis.",
                        "Checking the database...",
                        "Please upload a photo of the leaf."
                    ];
                    const randomReply = replies[Math.floor(Math.random() * replies.length)];
                    addMessage(randomReply, false);
                }, 1000);
            }
        });

        // Handle Enter Key
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendBtn.click();
            }
        });

        // Auto scroll on load
        window.onload = () => {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    </script>
</body>
</html>
