<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroPlus | Pest Radar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Tiro+Devanagari+Marathi&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'agro-purple': '#9333ea', 
                        'agro-purple-dark': '#7e22ce',
                        'risk-low': '#10b981',    /* Emerald-500 */
                        'risk-med': '#f59e0b',    /* Amber-500 */
                        'risk-high': '#f97316',   /* Orange-500 */
                        'risk-severe': '#ef4444', /* Red-500 */
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        marathi: ['"Tiro Devanagari Marathi"', 'serif'],
                    },
                    animation: {
                        'radar-spin': 'spin 3s linear infinite',
                        'ping-slow': 'ping 2s cubic-bezier(0, 0, 0.2, 1) infinite',
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'blob': 'blob 7s infinite',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { transform: 'translateY(100%)' },
                            '100%': { transform: 'translateY(0)' },
                        },
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.07)',
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #f8fafc; 
            
            -webkit-tap-highlight-color: transparent; 
        }
        
        /* Modern Radar Visuals */
        .radar-sweep {
            background: conic-gradient(from 0deg, transparent 0deg, rgba(16, 185, 129, 0.05) 200deg, rgba(16, 185, 129, 0.6) 360deg);
            border-radius: 50%;
            filter: blur(2px);
        }
        .radar-grid {
            background-image: 
                radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px),
                radial-gradient(circle, transparent 69%, rgba(255,255,255,0.05) 70%, transparent 71%),
                radial-gradient(circle, transparent 39%, rgba(255,255,255,0.05) 40%, transparent 41%);
            background-size: 20px 20px, 100% 100%, 100% 100%;
        }

        /* Modern Glass Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }

        /* Risk Meter Gradient */
        .risk-meter-bg {
            background: linear-gradient(90deg, #10b981 0%, #f59e0b 50%, #ef4444 100%);
        }

        /* Bottom Sheet Styling */
        .bottom-sheet { display: none; }
        .bottom-sheet.active { display: block; }
        
        /* Scrollbar Hide */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="font-sans text-slate-800 pb-32 relative overflow-x-hidden bg-slate-50">

    <!-- Ambient Background Animation -->
    <div class="fixed inset-0 pointer-events-none -z-10 overflow-hidden">
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-purple-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
        <div class="absolute top-0 right-1/4 w-96 h-96 bg-fuchsia-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-32 left-1/3 w-96 h-96 bg-emerald-100 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-4000"></div>
    </div>

    <!-- Header -->
    <header class="pt-8 pb-4 px-6 relative z-20">
        <div class="flex items-center justify-between">
            <button onclick="history.back()" class="bg-white/80 backdrop-blur-md p-3 rounded-full text-slate-700 shadow-sm border border-white hover:bg-white transition active:scale-95">
                 <i class="fas fa-arrow-left"></i>
            </button>
            
            <div class="text-center flex flex-col items-center">
                <!-- AI Logo Added Here -->
                <span class="text-[10px] font-bold tracking-widest text-slate-400 uppercase">Early Warning System</span>
                <h1 class="text-2xl font-black text-slate-800 tracking-tight">Pest Radar</h1>
            </div>

            <button class="bg-white/80 backdrop-blur-md p-3 rounded-full text-slate-700 shadow-sm border border-white hover:bg-white transition active:scale-95 relative">
               <a href="agrolive.html"> <i class="far fa-bell"></i></a>
                <span class="absolute top-2 right-2.5 w-2 h-2 bg-red-500 rounded-full border border-white"></span>
            </button>
        </div>

        <!-- Location Chip -->
        <div class="flex justify-center mt-4">
            <button onclick="openLocationModal()" class="flex items-center gap-2 bg-slate-900 text-white pl-4 pr-2 py-1.5 rounded-full shadow-lg shadow-slate-900/20 active:scale-95 transition group">
                <span class="text-xs font-bold tracking-wide uppercase" id="header-location">Boisar, Palghar</span>
                <div class="w-6 h-6 bg-slate-700 rounded-full flex items-center justify-center group-hover:bg-slate-600 transition">
                    <i class="fas fa-chevron-down text-[10px]"></i>
                </div>
            </button>
        </div>
    </header>

    <main class="px-5 mt-2 relative z-30 max-w-lg mx-auto space-y-6">

        <!-- 1. THE RADAR CARD -->
        <div class="bg-slate-900 rounded-[2.5rem] p-1.5 shadow-2xl shadow-slate-900/20 border border-slate-700 relative group overflow-hidden">
            <!-- Inner Glow -->
            <div class="absolute inset-0 bg-gradient-to-b from-slate-800/50 to-slate-900 rounded-[2.5rem] pointer-events-none"></div>

            <!-- Radar Visual -->
            <div class="aspect-square relative radar-grid bg-slate-900 rounded-[2rem] overflow-hidden">
                <!-- User Location (Center) -->
                <div class="absolute inset-0 flex items-center justify-center z-20">
                    <div class="w-3 h-3 bg-white rounded-full ring-4 ring-white/10 animate-pulse shadow-[0_0_20px_rgba(255,255,255,0.5)]"></div>
                </div>

                <!-- Scanning Line -->
                <div class="absolute inset-0 rounded-full animate-radar-spin z-10">
                    <div class="w-full h-full radar-sweep opacity-80" id="radar-beam"></div>
                </div>

                <!-- Dynamic Blips -->
                <div id="radar-blips" class="absolute inset-0 z-10"></div>

                <!-- Stats Overlay -->
                <div class="absolute top-4 left-4 z-30">
                    <div class="bg-white/10 backdrop-blur-md text-white text-[10px] px-3 py-1.5 rounded-full border border-white/10 flex items-center gap-2">
                        <span class="w-1.5 h-1.5 bg-green-400 rounded-full animate-pulse"></span>
                        Scanning Radius: <span class="font-bold">15 km</span>
                    </div>
                </div>
            </div>

            <!-- Risk Status Bar -->
            <div class="bg-slate-800/50 backdrop-blur-sm p-5 rounded-b-[2rem] border-t border-white/5">
                <div class="flex justify-between items-end mb-3">
                    <div>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Risk Analysis</p>
                        <h2 class="text-3xl font-black text-white tracking-tighter" id="risk-text">Scanning...</h2>
                    </div>
                    <div class="text-right">
                        <span class="text-4xl font-bold text-white" id="risk-score">--</span>
                        <span class="text-sm text-slate-500 font-medium">/100</span>
                    </div>
                </div>
                
                <!-- Gauge Bar -->
                <div class="h-2 w-full bg-slate-700/50 rounded-full overflow-hidden relative">
                    <div class="absolute inset-0 risk-meter-bg opacity-20"></div>
                    <div id="risk-bar" class="h-full rounded-full transition-all duration-1000 w-0 relative shadow-[0_0_15px_currentColor]"></div>
                </div>
            </div>
        </div>

        <!-- 2. DATA INPUTS & SUMMARY -->
        <div class="glass-card p-6 rounded-[2rem]">
            <div class="flex justify-between items-center mb-5">
                <div>
                    <h3 class="font-bold text-slate-800 text-lg">Crop Config</h3>
                    <p class="text-[10px] text-slate-400 font-medium mt-0.5" id="last-updated">Updated just now</p>
                </div>
                <div class="bg-purple-50 text-agro-purple text-[10px] font-bold px-2 py-1 rounded-lg border border-purple-100">
                    <span id="location-display">BOISAR</span>
                </div>
            </div>
            
            <div class="flex gap-3 overflow-x-auto pb-4 -mx-2 px-2 no-scrollbar" id="crop-selector">
                <button class="crop-btn active flex-shrink-0 pl-3 pr-5 py-3 rounded-2xl bg-slate-900 text-white text-sm font-bold shadow-lg shadow-slate-900/20 flex items-center gap-2 transition-all" data-crop="Cotton">
                    <div class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center text-base"><i class="fas fa-spa"></i></div>
                    Cotton
                </button>
                <button class="crop-btn flex-shrink-0 pl-3 pr-5 py-3 rounded-2xl bg-white text-slate-500 text-sm font-bold border border-slate-200 flex items-center gap-2 transition-all hover:bg-slate-50" data-crop="Soybean">
                    <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-base"><i class="fas fa-leaf"></i></div>
                    Soybean
                </button>
                <button class="crop-btn flex-shrink-0 pl-3 pr-5 py-3 rounded-2xl bg-white text-slate-500 text-sm font-bold border border-slate-200 flex items-center gap-2 transition-all hover:bg-slate-50" data-crop="Wheat">
                    <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-base"><i class="fas fa-wheat"></i></div>
                    Wheat
                </button>
            </div>

            <!-- Modern Weather Grid -->
            <div class="grid grid-cols-3 gap-3 mt-2">
                <div class="bg-blue-50/50 border border-blue-100 p-3 rounded-2xl flex flex-col items-center justify-center">
                    <i class="fas fa-temperature-high text-blue-400 text-lg mb-1"></i>
                    <p class="font-bold text-slate-700 text-lg" id="weather-temp">--°</p>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Temp</p>
                </div>
                <div class="bg-cyan-50/50 border border-cyan-100 p-3 rounded-2xl flex flex-col items-center justify-center">
                    <i class="fas fa-tint text-cyan-400 text-lg mb-1"></i>
                    <p class="font-bold text-slate-700 text-lg" id="weather-humidity">--%</p>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Humid</p>
                </div>
                <div class="bg-rose-50/50 border border-rose-100 p-3 rounded-2xl flex flex-col items-center justify-center">
                    <i class="fas fa-map-marker-alt text-rose-400 text-lg mb-1"></i>
                    <p class="font-bold text-slate-700 text-lg" id="report-count">--</p>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Reports</p>
                </div>
            </div>
        </div>

        <!-- 3. MARATHI ADVISORY -->
        <div class="bg-white border border-slate-100 p-1 rounded-[2rem] shadow-sm relative overflow-hidden group" id="advisory-wrapper">
            <div class="absolute inset-0 bg-gradient-to-br from-orange-50 via-white to-white opacity-0 transition duration-500 group-hover:opacity-100" id="advisory-bg"></div>
            
            <div class="relative p-5 z-10">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-8 h-8 rounded-full bg-orange-100 flex items-center justify-center text-orange-600">
                        <i class="fas fa-bullhorn text-sm"></i>
                    </div>
                    <h4 class="font-bold text-slate-400 text-xs uppercase tracking-widest">Advisory</h4>
                </div>
                
                <p class="font-marathi text-xl font-medium text-slate-800 leading-relaxed" id="marathi-msg">
                    माहिती लोड होत आहे...
                </p>
                
                <div class="mt-4 flex gap-2">
                    <span class="text-[10px] bg-slate-100 px-3 py-1.5 rounded-full text-slate-600 font-bold border border-slate-200">
                        <i class="far fa-clock mr-1"></i> Next 48h
                    </span>
                    <span class="text-[10px] bg-slate-100 px-3 py-1.5 rounded-full text-slate-600 font-bold border border-slate-200">
                        <i class="fas fa-wind mr-1"></i> Spread: High
                    </span>
                </div>
            </div>
        </div>

    </main>

    <!-- FIXED BOTTOM DOCK -->
    <div class="fixed bottom-0 left-0 right-0 z-40 bg-white/80 backdrop-blur-xl border-t border-white/50 p-5 pb-8 shadow-[0_-10px_40px_rgba(0,0,0,0.03)]">
        <button class="w-full bg-slate-900 text-white font-bold text-lg py-4 rounded-2xl shadow-xl shadow-slate-900/20 active:scale-95 transition-all flex items-center justify-center gap-3 hover:bg-slate-800">
            <div class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center"><i class="fas fa-camera text-sm"></i></div>
            <span>Report Pest Activity</span>
        </button>
    </div>

    <!-- LOCATION MODAL -->
    <div id="location-modal" class="fixed inset-0 z-50 bottom-sheet">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" onclick="closeLocationModal()"></div>
        <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[2.5rem] p-8 shadow-2xl animate-slide-up">
            <div class="w-16 h-1.5 bg-slate-200 rounded-full mx-auto mb-8"></div>
            
            <h3 class="text-2xl font-black text-slate-800 mb-6 tracking-tight">Select Location</h3>

            <button onclick="autoDetectLocation()" class="w-full flex items-center gap-4 p-5 bg-purple-50/50 rounded-[1.5rem] border border-purple-100 mb-6 group active:scale-95 transition hover:bg-purple-50">
                <div class="w-12 h-12 rounded-full bg-white flex items-center justify-center text-agro-purple shadow-sm group-hover:scale-110 transition">
                    <i class="fas fa-crosshairs text-lg"></i>
                </div>
                <div class="text-left">
                    <h4 class="font-bold text-slate-800">Use Current Location</h4>
                    <p class="text-xs text-slate-500 font-medium mt-0.5" id="gps-status">Tap to auto-detect using GPS</p>
                </div>
                <i class="fas fa-chevron-right ml-auto text-slate-300"></i>
            </button>

            <div class="space-y-4">
                <div class="relative group">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 block pl-4">District</label>
                    <select id="district-select" onchange="populateCities()" class="w-full bg-slate-50 p-5 rounded-2xl font-bold text-slate-700 outline-none appearance-none border border-slate-200 focus:border-agro-purple focus:ring-4 focus:ring-purple-100 transition">
                        <option value="" disabled selected>Select District</option>
                    </select>
                    <i class="fas fa-chevron-down absolute right-6 bottom-5 text-slate-400 pointer-events-none group-focus-within:text-agro-purple transition"></i>
                </div>

                <div class="relative opacity-50 transition group" id="city-wrapper">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 block pl-4">City / Taluka</label>
                    <select id="city-select" disabled onchange="enableConfirm()" class="w-full bg-slate-50 p-5 rounded-2xl font-bold text-slate-700 outline-none appearance-none border border-slate-200 focus:border-agro-purple focus:ring-4 focus:ring-purple-100 transition">
                        <option value="" disabled selected>Select City</option>
                    </select>
                    <i class="fas fa-chevron-down absolute right-6 bottom-5 text-slate-400 pointer-events-none group-focus-within:text-agro-purple transition"></i>
                </div>
            </div>

            <button id="confirm-loc-btn" onclick="applyManualLocation()" disabled class="w-full bg-slate-900 text-white font-bold py-5 rounded-2xl mt-8 shadow-xl shadow-slate-900/20 disabled:opacity-50 disabled:cursor-not-allowed transition active:scale-95 text-lg">
                Confirm Location
            </button>
        </div>
    </div>

    <script>
        // --- DATA & LOGIC ---
        const LOCATIONS_DB = {
            'Palghar': ['Boisar', 'Palghar City', 'Dahanu', 'Vikramgad'],
            'Pune': ['Pune City', 'Baramati', 'Indapur', 'Khed'],
            'Nashik': ['Nashik City', 'Malegaon', 'Sinnar', 'Niphad'],
            'Akola': ['Akola City', 'Balapur', 'Murtizapur'],
            'Nagpur': ['Nagpur City', 'Kamptee', 'Ramtek'],
            'Kolhapur': ['Kolhapur City', 'Karvir', 'Panhala']
        };

        const CLIMATE_PROFILES = {
            'Palghar': { temp: 30, hum: 80, risk: 2 },
            'Pune': { temp: 28, hum: 50, risk: 3 },
            'Nashik': { temp: 26, hum: 45, risk: 2 },
            'Akola': { temp: 38, hum: 30, risk: 5 },
            'Nagpur': { temp: 40, hum: 35, risk: 6 },
            'Kolhapur': { temp: 29, hum: 70, risk: 4 }
        };

        const CROPS = {
            'Cotton': { baseRisk: 25 },
            'Soybean': { baseRisk: 20 },
            'Wheat': { baseRisk: 10 }
        };

        const MARATHI_MESSAGES = {
            low: "सध्या तुमच्या पिकाला कोणताही मोठा धोका नाही. नियमित पाहणी करा.",
            medium: "तुमच्या परिसरात किडीचा मध्यम धोका आहे. आज सायंकाळी निरीक्षण करणे आवश्यक आहे.",
            high: "कापसात अळीचा प्रादुर्भाव होण्याची शक्यता. 48 तासात किडीचा प्रादुर्भाव वाढू शकतो.",
            severe: "धोकादायक परिस्थिती! पिकावर त्वरित कीटकनाशकाची फवारणी करावी."
        };

        let currentCrop = 'Cotton';
        let currentDistrict = 'Palghar';
        let currentCity = 'Boisar';

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', () => {
            initDistricts();
            refreshData();
            
            document.querySelectorAll('.crop-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.crop-btn').forEach(b => {
                        b.classList.remove('bg-slate-900', 'text-white', 'shadow-lg');
                        b.classList.add('bg-white', 'text-slate-500', 'border', 'border-slate-200');
                        b.querySelector('div').className = "w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-base";
                    });
                    
                    const target = e.currentTarget;
                    target.classList.remove('bg-white', 'text-slate-500', 'border', 'border-slate-200');
                    target.classList.add('bg-slate-900', 'text-white', 'shadow-lg');
                    target.querySelector('div').className = "w-8 h-8 rounded-full bg-white/20 flex items-center justify-center text-base";
                    
                    currentCrop = target.dataset.crop;
                    refreshData();
                });
            });
        });

        // --- LOCATION LOGIC ---
        function openLocationModal() { document.getElementById('location-modal').classList.add('active'); }
        function closeLocationModal() { document.getElementById('location-modal').classList.remove('active'); }

        function initDistricts() {
            const select = document.getElementById('district-select');
            for (const dist in LOCATIONS_DB) {
                const opt = document.createElement('option');
                opt.value = dist; opt.innerText = dist;
                select.appendChild(opt);
            }
        }

        function populateCities() {
            const distSelect = document.getElementById('district-select');
            const citySelect = document.getElementById('city-select');
            const wrapper = document.getElementById('city-wrapper');
            const selectedDist = distSelect.value;
            const cities = LOCATIONS_DB[selectedDist];

            citySelect.innerHTML = '<option value="" disabled selected>Select City</option>';
            cities.forEach(city => {
                const opt = document.createElement('option');
                opt.value = city; opt.innerText = city;
                citySelect.appendChild(opt);
            });

            citySelect.disabled = false;
            wrapper.classList.remove('opacity-50');
        }

        function enableConfirm() { document.getElementById('confirm-loc-btn').disabled = false; }

        function applyManualLocation() {
            currentDistrict = document.getElementById('district-select').value;
            currentCity = document.getElementById('city-select').value;
            updateHeaderDisplay(currentCity, currentDistrict);
            refreshData();
            closeLocationModal();
        }

        function autoDetectLocation() {
            const status = document.getElementById('gps-status');
            status.innerText = "Triangulating...";
            status.classList.add('text-agro-purple', 'animate-pulse');

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        setTimeout(() => {
                            currentDistrict = 'Pune'; currentCity = 'Baramati';
                            updateHeaderDisplay(currentCity, currentDistrict);
                            refreshData();
                            closeLocationModal();
                            status.innerText = "Tap to auto-detect using GPS";
                            status.classList.remove('text-agro-purple', 'animate-pulse');
                        }, 1500);
                    },
                    (error) => {
                        status.innerText = "Permission denied.";
                        status.classList.replace('text-agro-purple', 'text-red-500');
                    }
                );
            }
        }

        function updateHeaderDisplay(city, district) {
            const text = `${city}, ${district}`;
            document.getElementById('header-location').innerText = text;
            document.getElementById('location-display').innerText = city.toUpperCase();
        }

        // --- RISK ENGINE ---
        function refreshData() {
            const profile = CLIMATE_PROFILES[currentDistrict] || CLIMATE_PROFILES['Palghar'];
            const temp = profile.temp + Math.floor(Math.random() * 6 - 3);
            const humidity = profile.hum + Math.floor(Math.random() * 10 - 5);
            const reportCount = Math.max(0, profile.risk + Math.floor(Math.random() * 4 - 2));

            document.getElementById('weather-temp').innerText = temp + "°";
            document.getElementById('weather-humidity').innerText = humidity + "%";
            document.getElementById('report-count').innerText = reportCount;

            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            document.getElementById('last-updated').innerText = `Updated ${timeString}`;

            renderBlips(reportCount);

            let score = 0;
            if (humidity > 70) score += 20;
            else if (humidity > 50) score += 10;
            if (temp >= 25 && temp <= 35) score += 20;
            score += CROPS[currentCrop].baseRisk;
            score += Math.min(reportCount * 5, 30);
            score = Math.min(score, 100);

            updateRiskUI(score);
        }

        function renderBlips(count) {
            const container = document.getElementById('radar-blips');
            container.innerHTML = '';
            for(let i=0; i<count; i++) {
                const blip = document.createElement('div');
                const angle = Math.random() * 360;
                const dist = Math.random() * 40 + 10;
                
                blip.className = "absolute w-2 h-2 rounded-full shadow-[0_0_8px_currentColor] animate-ping-slow";
                
                const sev = Math.random();
                if(sev > 0.7) blip.classList.add('bg-red-500', 'text-red-500');
                else if(sev > 0.4) blip.classList.add('bg-orange-500', 'text-orange-500');
                else blip.classList.add('bg-yellow-400', 'text-yellow-400');

                blip.style.top = `calc(50% + ${Math.sin(angle) * dist}%)`;
                blip.style.left = `calc(50% + ${Math.cos(angle) * dist}%)`;
                container.appendChild(blip);
            }
        }

        function updateRiskUI(score) {
            const riskText = document.getElementById('risk-text');
            const riskScore = document.getElementById('risk-score');
            const riskBar = document.getElementById('risk-bar');
            const radarBeam = document.getElementById('radar-beam');
            const marathiMsg = document.getElementById('marathi-msg');
            const wrapper = document.getElementById('advisory-wrapper');
            const bg = document.getElementById('advisory-bg');

            let level, color, beam, msg, bgClass, textColor;

            if (score <= 30) {
                level = 'Low Risk'; color = 'bg-emerald-500 shadow-emerald-500/50'; beam = 'rgba(16, 185, 129,';
                msg = MARATHI_MESSAGES.low;
                bgClass = "from-emerald-50 via-white to-white";
                textColor = "text-emerald-500";
            } else if (score <= 60) {
                level = 'Medium Risk'; color = 'bg-amber-500 shadow-amber-500/50'; beam = 'rgba(245, 158, 11,';
                msg = MARATHI_MESSAGES.medium;
                bgClass = "from-amber-50 via-white to-white";
                textColor = "text-amber-500";
            } else if (score <= 80) {
                level = 'High Risk'; color = 'bg-orange-500 shadow-orange-500/50'; beam = 'rgba(249, 115, 22,';
                msg = MARATHI_MESSAGES.high;
                bgClass = "from-orange-50 via-white to-white";
                textColor = "text-orange-500";
            } else {
                level = 'Severe Risk'; color = 'bg-red-500 shadow-red-500/50'; beam = 'rgba(239, 68, 68,';
                msg = MARATHI_MESSAGES.severe;
                bgClass = "from-red-50 via-white to-white";
                textColor = "text-red-500";
            }

            riskText.innerText = level;
            riskText.className = `text-3xl font-black tracking-tighter ${textColor}`;
            riskScore.innerText = score;
            
            riskBar.style.width = `${score}%`;
            riskBar.className = `h-full rounded-full transition-all duration-1000 w-0 relative ${color}`;
            
            radarBeam.style.background = `conic-gradient(from 0deg, transparent 0deg, ${beam} 0.05) 200deg, ${beam} 0.6) 360deg)`;
            
            marathiMsg.innerText = msg;
            wrapper.className = `bg-white border border-slate-100 p-1 rounded-[2rem] shadow-sm relative overflow-hidden group transition-all`;
            bg.className = `absolute inset-0 bg-gradient-to-br ${bgClass} opacity-50 transition duration-500`;
        }
    </script>
</body>
