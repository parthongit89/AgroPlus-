<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>किसान कनेक्ट लॉगिन प्रवाह</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Mukta:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons for visuals -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-yellow': '#facc15',
                        'background-dark': '#4b5563',
                        'farm-green': '#15803d'
                    },
                    fontFamily: {
                        sans: ['Mukta', 'Inter', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .farm-bg {
            background-image: url('https://i.supaimg.com/4f2b3438-4977-4616-a55a-0f95187a60c8.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
            z-index: 1;
        }
        .farm-bg::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.65);
            z-index: 0;
        }
        .form-input {
            background-color: transparent;
            border-bottom: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding-bottom: 8px;
            transition: border-color 0.3s;
        }
        .form-input:focus {
            border-color: #facc15;
            outline: none;
        }
        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        /* Loader Spinner */
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #facc15;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="farm-bg font-sans min-h-screen flex flex-col items-center justify-center p-4 overflow-hidden">

    <!-- Dynamic Content Container -->
    <div class="z-10 w-full max-w-sm mx-auto relative min-h-[500px] flex flex-col justify-center">
        
        <!-- Logo (Always visible unless on dashboard) -->
        <div id="logoContainer" class="flex justify-center mb-8 transition-all duration-500">
            <div class="relative group">
                <img 
                    src="https://i.supaimg.com/e409a04b-622b-45c4-b801-446ac1064f93.png" 
                    alt="Kisan Connect Logo" 
                    class="rounded-full shadow-2xl border-4 border-white/20 w-29 h-32 object-cover bg-white/10 backdrop-blur-sm p-3"
                />
                <div class="absolute -bottom-2 w-full text-center">
                    <span class="bg-primary-yellow text-black text-xs font-bold px-2 py-1 rounded-full shadow-sm">किसान कनेक्ट</span>
                </div>
            </div>
        </div>

        <!-- VIEW 1: LOGIN FORM -->
        <div id="loginView" class="animate-fade-in w-full bg-black/20 backdrop-blur-sm p-6 rounded-2xl border border-white/10 shadow-2xl">
            <form id="loginForm" class="space-y-6">
                <h2 class="text-white text-xl font-bold text-center mb-4">शेतकरी लॉगिन</h2>
                
                <div>
                    <label for="email" class="block text-white text-sm mb-2 opacity-90">ईमेल आयडी किंवा फोन</label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-0 bottom-3 text-white/50 w-5 h-5"></i>
                        <input type="text" id="email" placeholder="farmer@kisan.com" class="form-input w-full pl-8" required value="farmer@kisan.com">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-white text-sm mb-2 opacity-90">पासवर्ड</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-0 bottom-3 text-white/50 w-5 h-5"></i>
                        <input type="password" id="password" placeholder="••••••••" class="form-input w-full pl-8" required value="password">
                    </div>
                </div>

                <div class="flex items-center justify-between text-white text-xs">
                    <div class="flex items-center">
                        <input type="checkbox" id="remember" class="h-4 w-4 rounded border-gray-300 bg-transparent text-primary-yellow focus:ring-primary-yellow">
                        <label for="remember" class="ml-2">लक्षात ठेवा</label>
                    </div>
                    <a href="#" class="hover:text-primary-yellow transition">पासवर्ड विसरलात?</a>
                </div>

                <button type="submit" class="w-full bg-primary-yellow text-black font-bold py-3 px-4 rounded-xl shadow-lg hover:bg-yellow-400 transition transform hover:scale-[1.02] flex justify-center items-center gap-2">
                    <span>OTP मिळवा</span>
                    <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>
        </div>

        <!-- VIEW 2: OTP FORM (Hidden Initially) -->
        <div id="otpView" class="hidden w-full bg-black/20 backdrop-blur-sm p-6 rounded-2xl border border-white/10 shadow-2xl">
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-white/10 mb-4 text-primary-yellow">
                    <i data-lucide="smartphone" class="w-6 h-6"></i>
                </div>
                <h2 class="text-white text-xl font-bold">पडताळणी</h2>
                <p class="text-gray-300 text-sm mt-2">आम्ही तुमच्या नोंदणीकृत क्रमांकावर एक कोड पाठवला आहे.</p>
                <p class="text-primary-yellow text-sm font-bold mt-1">OTP: 1234</p>
            </div>

            <form id="otpForm" class="space-y-6">
                <div class="flex justify-center gap-3">
                    <input type="text" maxlength="1" class="otp-digit w-12 h-14 text-center text-xl font-bold bg-white/10 border-2 border-white/20 rounded-lg text-white focus:border-primary-yellow focus:outline-none focus:bg-white/20 transition" autofocus>
                    <input type="text" maxlength="1" class="otp-digit w-12 h-14 text-center text-xl font-bold bg-white/10 border-2 border-white/20 rounded-lg text-white focus:border-primary-yellow focus:outline-none focus:bg-white/20 transition">
                    <input type="text" maxlength="1" class="otp-digit w-12 h-14 text-center text-xl font-bold bg-white/10 border-2 border-white/20 rounded-lg text-white focus:border-primary-yellow focus:outline-none focus:bg-white/20 transition">
                    <input type="text" maxlength="1" class="otp-digit w-12 h-14 text-center text-xl font-bold bg-white/10 border-2 border-white/20 rounded-lg text-white focus:border-primary-yellow focus:outline-none focus:bg-white/20 transition">
                </div>
                
                <div class="text-center text-xs text-white/60">
                    कोड मिळाला नाही? <button type="button" class="text-primary-yellow font-bold hover:underline">पुन्हा पाठवा</button>
                </div>

                <button type="submit" class="w-full bg-primary-yellow text-black font-bold py-3 px-4 rounded-xl shadow-lg hover:bg-yellow-400 transition transform hover:scale-[1.02]">
                    पडताळणी करा आणि लॉगिन करा
                </button>
                
                <button type="button" id="backToLogin" class="w-full text-white text-sm py-2 hover:text-white/80 transition">
                    ← मागे जा
                </button>
            </form>
        </div>

        <!-- LOADING OVERLAY -->
        <div id="loadingOverlay" class="hidden absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/80 backdrop-blur-sm rounded-2xl">
            <div class="loader mb-4"></div>
            <p id="loadingText" class="text-white font-medium animate-pulse">प्रक्रिया होत आहे...</p>
        </div>

    </div>

    <!-- Scripts for Logic -->
    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Element References
        const loginForm = document.getElementById('loginForm');
        const otpForm = document.getElementById('otpForm');
        
        const loginView = document.getElementById('loginView');
        const otpView = document.getElementById('otpView');
        
        const logoContainer = document.getElementById('logoContainer');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        
        const otpInputs = document.querySelectorAll('.otp-digit');

        // Helper: Show Loader
        function showLoader(message = "प्रक्रिया होत आहे...") {
            loadingText.textContent = message;
            loadingOverlay.classList.remove('hidden');
        }

        // Helper: Hide Loader
        function hideLoader() {
            loadingOverlay.classList.add('hidden');
        }

        // 1. Handle Login Submission
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Step 1: Loading Animation
            showLoader("माहिती तपासत आहे...");
            
            setTimeout(() => {
                // Step 2: Stop Loader, Hide Login, Show OTP
                hideLoader();
                
                loginView.classList.add('hidden'); // Hide Login
                otpView.classList.remove('hidden'); // Show OTP
                otpView.classList.add('animate-fade-in'); // Add animation
                
                // Focus first OTP input
                otpInputs[0].focus();
                
                showLoader("OTP पाठवत आहे...");
                setTimeout(() => {
                    hideLoader();
                    // Just a visual cue
                }, 1000);

            }, 2000); // 2 second mock delay
        });

        // OTP Input Logic (Auto-focus next input)
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if(e.target.value.length === 1) {
                    if(index < otpInputs.length - 1) {
                        otpInputs[index + 1].focus();
                    }
                }
            });
            
            input.addEventListener('keydown', (e) => {
                if(e.key === 'Backspace' && e.target.value === '') {
                    if(index > 0) {
                        otpInputs[index - 1].focus();
                    }
                }
            });
        });

        // 2. Handle OTP Submission
        otpForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Combine OTP inputs
            let enteredOtp = '';
            otpInputs.forEach(input => enteredOtp += input.value);

            // Simple validation
            if (enteredOtp.length !== 4) {
                alert("कृपया 4-अंकी OTP प्रविष्ट करा");
                return;
            }

            // Step 3: Success Loading
            showLoader("OTP तपासत आहे...");

            setTimeout(() => {
                loadingText.textContent = "लॉगिन यशस्वी!";
                loadingText.classList.remove('animate-pulse');
                loadingText.classList.add('text-green-400');
                
                setTimeout(() => {
                    // Step 4: Redirect to Home Page
                    hideLoader();
                    
                    // Redirect to the new home page file
                    window.location.href = "login page 2(M).html";
                    
                }, 1000);

            }, 2000);
        });

        // Back button logic
        document.getElementById('backToLogin').addEventListener('click', () => {
            otpView.classList.add('hidden');
            loginView.classList.remove('hidden');
            loginView.classList.add('animate-fade-in');
        });

    </script>
</body>
</html>
