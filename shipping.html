<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom animations if needed */
        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in-up {
            animation: fade-in-up 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="module">
        import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
        import { Package, Truck, CheckCircle, Clock, MapPin, ChevronRight, ChevronLeft, RefreshCw } from 'https://esm.sh/lucide-react@0.263.1';

        // --- Constants & Data ---
        const STEPS = [
            {
                id: 1,
                title: "Order Placed",
                date: "Oct 24, 2025",
                time: "10:30 AM",
                description: "Your order has been received and is being processed.",
                icon: React.createElement(Package, { className: "w-5 h-5" }),
            },
            {
                id: 2,
                title: "Processing",
                date: "Oct 25, 2025",
                time: "02:15 PM",
                description: "We are packing your items with care.",
                icon: React.createElement(Clock, { className: "w-5 h-5" }),
            },
            {
                id: 3,
                title: "Shipped",
                date: "Oct 26, 2025",
                time: "09:45 AM",
                description: "Your package has left our facility.",
                icon: React.createElement(Truck, { className: "w-5 h-5" }),
            },
            {
                id: 4,
                title: "Out for Delivery",
                date: "Oct 28, 2025",
                time: "08:00 AM",
                description: "The courier is on the way to your doorstep.",
                icon: React.createElement(MapPin, { className: "w-5 h-5" }),
            },
            {
                id: 5,
                title: "Delivered",
                date: "Pending",
                time: "--:--",
                description: "Package delivered successfully.",
                icon: React.createElement(CheckCircle, { className: "w-5 h-5" }),
            },
        ];

        // --- SVG Path Logic ---
        const PATH_COORDS = [
            { x: 150, y: 60 },  // Dot 1: Top
            { x: 70,  y: 180 }, // Dot 2: Left Bulge
            { x: 150, y: 300 }, // Dot 3: Center
            { x: 230, y: 420 }, // Dot 4: Right Bulge
            { x: 150, y: 540 }, // Dot 5: Bottom
        ];

        const getSegmentPath = (index) => {
            const start = PATH_COORDS[index];
            const end = PATH_COORDS[index + 1];

            if (!start || !end) return "";

            if (index === 0) {
                return `M ${start.x} ${start.y} C ${start.x - 80} ${start.y + 10}, ${end.x - 20} ${end.y - 60}, ${end.x} ${end.y}`;
            } else if (index === 1) {
                return `M ${start.x} ${start.y} C ${start.x + 10} ${start.y + 60}, ${end.x - 40} ${end.y - 40}, ${end.x} ${end.y}`;
            } else if (index === 2) {
                return `M ${start.x} ${start.y} C ${start.x + 40} ${start.y + 40}, ${end.x - 10} ${end.y - 60}, ${end.x} ${end.y}`;
            } else if (index === 3) {
                return `M ${start.x} ${start.y} C ${start.x + 20} ${start.y + 60}, ${end.x + 80} ${end.y - 10}, ${end.x} ${end.y}`;
            }
            return "";
        };

        function App() {
            const [currentStep, setCurrentStep] = useState(1);
            const [isAnimating, setIsAnimating] = useState(false);

            const handleNext = () => {
                if (currentStep < STEPS.length) {
                    setCurrentStep(curr => curr + 1);
                }
            };

            const handlePrev = () => {
                if (currentStep > 1) {
                    setCurrentStep(curr => curr - 1);
                }
            };

            const handleReset = () => {
                setCurrentStep(1);
            };

            return React.createElement('div', { className: "min-h-screen bg-slate-50 font-sans text-slate-800 pb-20" },
                // Header
                React.createElement('header', { className: "bg-[#3b82f6] text-white p-6 rounded-b-[40px] shadow-lg sticky top-0 z-20" },
                    React.createElement('div', { className: "max-w-md mx-auto flex justify-between items-center" },
                        React.createElement('div', null,
                            React.createElement('h1', { className: "text-2xl font-bold" }, "Track Order"),
                            React.createElement('p', { className: "text-blue-100 text-sm opacity-90" }, "#ORD-29384-KA")
                        ),
                        React.createElement('div', { className: "bg-white/20 p-2 rounded-full backdrop-blur-sm" },
                            React.createElement(Package, { className: "w-6 h-6 text-white" })
                        )
                    )
                ),

                // Main Content
                React.createElement('main', { className: "max-w-md mx-auto mt-8 relative px-4" },
                    React.createElement('div', { className: "relative", style: { height: '620px' } },
                        
                        // SVG Track
                        React.createElement('div', { className: "absolute top-0 left-0 w-full h-full pointer-events-none z-0 flex justify-center" },
                            React.createElement('svg', { width: "300", height: "600", viewBox: "0 0 300 600", className: "overflow-visible" },
                                // Defs
                                React.createElement('defs', null,
                                    React.createElement('filter', { id: "glow", x: "-20%", y: "-20%", width: "140%", height: "140%" },
                                        React.createElement('feGaussianBlur', { stdDeviation: "3", result: "blur" }),
                                        React.createElement('feComposite', { in: "SourceGraphic", in2: "blur", operator: "over" })
                                    )
                                ),
                                // Base Dark Path
                                [0, 1, 2, 3].map((idx) => 
                                    React.createElement('path', {
                                        key: `bg-${idx}`,
                                        d: getSegmentPath(idx),
                                        fill: "none",
                                        stroke: "#1e3a5f",
                                        strokeWidth: "32",
                                        strokeLinecap: "round",
                                        className: "opacity-100"
                                    })
                                ),
                                // Active Progress Path
                                [0, 1, 2, 3].map((idx) => {
                                    const isActive = currentStep > idx + 1;
                                    return React.createElement('path', {
                                        key: `progress-${idx}`,
                                        d: getSegmentPath(idx),
                                        fill: "none",
                                        stroke: "#3b82f6",
                                        strokeWidth: "16",
                                        strokeLinecap: "round",
                                        className: `transition-all duration-1000 ease-in-out ${isActive ? 'opacity-100' : 'opacity-0'}`,
                                        style: { 
                                            strokeDasharray: 1000, 
                                            strokeDashoffset: isActive ? 0 : 1000 
                                        }
                                    });
                                }),
                                // Dots
                                PATH_COORDS.map((coord, index) => {
                                    const stepNum = index + 1;
                                    const isCompleted = currentStep > stepNum;
                                    const isCurrent = currentStep === stepNum;
                                    const isPending = currentStep < stepNum;

                                    return React.createElement('g', { key: `dot-${index}` },
                                        // Outer Ring
                                        React.createElement('circle', {
                                            cx: coord.x,
                                            cy: coord.y,
                                            r: isCurrent ? 24 : 18,
                                            fill: isPending ? "#1e3a5f" : "#3b82f6",
                                            className: `transition-all duration-500 ${isCurrent ? "shadow-xl" : ""}`,
                                            stroke: isCurrent ? "white" : "none",
                                            strokeWidth: "4"
                                        }),
                                        // Inner Dot
                                        React.createElement('circle', {
                                            cx: coord.x,
                                            cy: coord.y,
                                            r: 8,
                                            fill: isPending ? "#334f75" : "white",
                                            className: "transition-colors duration-500"
                                        })
                                    );
                                })
                            )
                        ),

                        // Labels
                        STEPS.map((step, index) => {
                            const coord = PATH_COORDS[index];
                            let style = {};
                            let alignClass = "";

                            if (index === 0) {
                                style = { top: `${coord.y - 10}px`, left: '60%', transform: 'translate(20px, -50%)' };
                                alignClass = "text-left";
                            } else if (index === 1) {
                                style = { top: `${coord.y}px`, right: `${300 - coord.x + 30}px`, transform: 'translate(0, -50%)', width: '120px' };
                                alignClass = "text-right";
                            } else if (index === 2) {
                                style = { top: `${coord.y}px`, left: '60%', transform: 'translate(20px, -50%)' };
                                alignClass = "text-left";
                            } else if (index === 3) {
                                style = { top: `${coord.y}px`, left: `${coord.x + 30}px`, transform: 'translate(0, -50%)', width: '120px' };
                                alignClass = "text-left";
                            } else if (index === 4) {
                                style = { top: `${coord.y}px`, right: '55%', transform: 'translate(-20px, -50%)', width: '120px' };
                                alignClass = "text-right";
                            }

                            const isActive = currentStep >= step.id;
                            const isCurrent = currentStep === step.id;

                            return React.createElement('div', {
                                key: `label-${step.id}`,
                                className: `absolute transition-all duration-500 ${alignClass}`,
                                style: style
                            },
                                React.createElement('div', {
                                    className: `
                                        bg-white p-3 rounded-xl shadow-sm border border-slate-100
                                        ${isActive ? 'opacity-100 translate-y-0' : 'opacity-40 translate-y-2 grayscale'}
                                        ${isCurrent ? 'ring-2 ring-blue-400 scale-105 shadow-md z-10' : 'scale-100 z-0'}
                                        transition-all duration-500
                                    `
                                },
                                    React.createElement('h3', { className: `font-bold text-sm ${isActive ? 'text-slate-800' : 'text-slate-400'}` }, step.title),
                                    isActive && React.createElement('p', { className: "text-[10px] text-slate-500 font-medium mt-1" }, step.date)
                                )
                            );
                        })
                    ),

                    // Status Details Card
                    React.createElement('div', { className: "mt-4 bg-white rounded-2xl p-6 shadow-xl border border-slate-100 animate-fade-in-up" },
                        React.createElement('div', { className: "flex items-start gap-4" },
                            React.createElement('div', { className: "bg-blue-100 p-3 rounded-full text-blue-600" },
                                STEPS[currentStep - 1].icon
                            ),
                            React.createElement('div', null,
                                React.createElement('span', { className: "inline-block px-2 py-1 bg-blue-50 text-blue-600 text-xs font-bold rounded mb-1" }, "Current Status"),
                                React.createElement('h2', { className: "text-xl font-bold text-slate-800" }, STEPS[currentStep - 1].title),
                                React.createElement('p', { className: "text-slate-500 text-sm mt-1 leading-relaxed" }, STEPS[currentStep - 1].description),
                                React.createElement('div', { className: "flex gap-4 mt-4 text-xs font-medium text-slate-400" },
                                    React.createElement('span', { className: "flex items-center gap-1" },
                                        React.createElement(Clock, { className: "w-3 h-3" }),
                                        " ",
                                        STEPS[currentStep - 1].time
                                    ),
                                    React.createElement('span', { className: "flex items-center gap-1" },
                                        React.createElement(MapPin, { className: "w-3 h-3" }),
                                        " Austin, TX"
                                    )
                                )
                            )
                        )
                    )
                ),

                // Controls
                React.createElement('div', { className: "fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 p-4 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] z-30" },
                    React.createElement('div', { className: "max-w-md mx-auto flex justify-between items-center" },
                        React.createElement('button', {
                            onClick: handlePrev,
                            disabled: currentStep === 1,
                            className: "p-3 rounded-full hover:bg-slate-100 disabled:opacity-30 disabled:cursor-not-allowed text-slate-600 transition-colors"
                        }, React.createElement(ChevronLeft, null)),

                        React.createElement('div', { className: "text-center" },
                            React.createElement('span', { className: "text-xs font-bold text-slate-400 uppercase tracking-wider block" }, "Progress Demo"),
                            React.createElement('div', { className: "flex gap-1 justify-center mt-1" },
                                STEPS.map((_, i) => 
                                    React.createElement('div', {
                                        key: i,
                                        className: `h-1.5 w-1.5 rounded-full ${currentStep > i ? 'bg-blue-500' : 'bg-slate-200'}`
                                    })
                                )
                            )
                        ),

                        React.createElement('div', { className: "flex gap-2" },
                            React.createElement('button', {
                                onClick: handleReset,
                                className: "p-3 rounded-full hover:bg-slate-100 text-slate-500 transition-colors",
                                title: "Reset"
                            }, React.createElement(RefreshCw, { className: "w-5 h-5" })),
                            
                            React.createElement('button', {
                                onClick: handleNext,
                                disabled: currentStep === STEPS.length,
                                className: `
                                    flex items-center gap-2 px-6 py-3 rounded-full font-bold text-white shadow-lg shadow-blue-200
                                    transition-all duration-300 transform active:scale-95
                                    ${currentStep === STEPS.length ? 'bg-green-500 hover:bg-green-600' : 'bg-blue-600 hover:bg-blue-700'}
                                    disabled:opacity-50 disabled:cursor-not-allowed
                                `
                            },
                                currentStep === STEPS.length ? 'Completed' : 'Next Step',
                                currentStep !== STEPS.length && React.createElement(ChevronRight, { className: "w-4 h-4" })
                            )
                        )
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
